<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDCO Project Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#009BA5;--teal-dark:#007A82;--bg:#F2F2F7;--surface:#fff;--surface2:#F2F2F7;--text:#1C1C1E;--text2:#636366;--text3:#AEAEB2;--border:#E5E5EA;--green:#34C759;--orange:#FF9500;--red:#FF3B30;--blue:#007AFF;--r:12px;--rsm:8px;}
html,body{height:100%;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);-webkit-font-smoothing:antialiased}
.topbar{background:var(--teal);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.tb-logo{height:26px;filter:brightness(0) invert(1)}
.tb-fb{color:#fff;font-size:15px;font-weight:600;display:none}
.nav-tabs{display:flex;gap:3px}
.nav-tab{padding:6px 14px;font-size:13px;font-weight:500;border-radius:20px;border:none;cursor:pointer;font-family:inherit}
.nav-tab.active{background:rgba(255,255,255,0.25);color:#fff}
.nav-tab:not(.active){background:transparent;color:rgba(255,255,255,0.65)}
.nav-tab:hover:not(.active){background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.9)}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:16px 20px}
.metric{background:var(--surface);border-radius:var(--r);padding:13px 15px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.metric-value{font-size:24px;font-weight:300;letter-spacing:-0.02em}
.metric-sub{font-size:11px;color:var(--text3);margin-top:2px}
.toolbar{display:flex;align-items:center;gap:8px;padding:0 20px 12px;flex-wrap:wrap}
.toolbar select,.toolbar input{font-size:13px;padding:6px 10px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface);color:var(--text);height:32px;font-family:inherit}
.tbtn{padding:6px 12px;font-size:13px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;height:32px;font-family:inherit}
.tbtn:hover,.tbtn.active{background:var(--surface2)}
.btn-add{padding:6px 16px;font-size:13px;font-weight:500;border-radius:var(--rsm);border:none;background:var(--teal);color:#fff;cursor:pointer;height:32px;margin-left:auto;font-family:inherit}
.btn-add:hover{background:var(--teal-dark)}
.col-picker{position:relative}
.col-dropdown{position:absolute;top:36px;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px;min-width:210px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.col-dd-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;padding:2px 6px 8px}
.col-opt{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:var(--rsm);cursor:pointer;font-size:13px}
.col-opt:hover{background:var(--surface2)}
.col-opt.locked{opacity:0.4;cursor:default}
.alert-legend{display:flex;gap:12px;align-items:center;padding:0 20px 8px;font-size:11px;color:var(--text2)}
.leg-item{display:flex;align-items:center;gap:4px}
.table-wrap{overflow-x:auto;padding:0 20px 20px}
table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--r);border:1px solid var(--border);font-size:13px}
thead tr{border-bottom:1px solid var(--border)}
th{padding:10px 12px;text-align:left;font-weight:500;font-size:12px;color:var(--text2);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #F0F0EE;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAF8;cursor:pointer}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-ns{background:#EBF4FF;color:#1a6bbf}.b-prog{background:#F0EEFF;color:#5533cc}.b-hold{background:#FFF8EB;color:#996600}.b-over{background:#FFEBEB;color:#cc2222}.b-done{background:#F0F0EE;color:#666}
.alert-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.a-ok{background:#34C759}.a-warn{background:#FF9500}.a-crit{background:#FF3B30}.a-na{background:#ccc}
.alert-cell{display:flex;gap:4px;align-items:center}
.ap{display:inline-flex;padding:1px 6px;border-radius:20px;font-size:10px;font-weight:500;margin-left:2px}
.ap-c{background:#FFEBEB;color:#cc2222}.ap-w{background:#FFF8EB;color:#8a5c00}
.val-hi{color:#34C759;font-weight:500}.val-lo{color:#FF3B30;font-weight:500}
.row-act{cursor:pointer;color:#bbb;font-size:20px;background:none;border:none;padding:0 4px;line-height:1}
.row-act:hover{color:var(--text)}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.archive-wrap{padding:0 20px 20px}
.archive-search{width:100%;max-width:380px;font-size:13px;padding:8px 12px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;margin-bottom:12px;display:block}
.archive-search:focus{outline:none;border-color:var(--teal)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--surface);border-radius:16px;width:660px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.15)}
.modal-head{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:2}
.modal-head h2{font-size:15px;font-weight:600}
.modal-body{padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:13px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;color:var(--text2);font-weight:500}
.field label .req{color:var(--red);margin-left:2px;font-size:11px}
.field input,.field select,.field textarea{font-size:13px;padding:8px 10px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal)}
.field textarea{resize:vertical;min-height:62px}
.sec{grid-column:1/-1;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);padding-bottom:5px;margin-top:6px}
.modal-foot{padding:12px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surface)}
.btn-cancel{padding:8px 16px;font-size:13px;border-radius:var(--rsm);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.btn-cancel:hover{background:var(--surface2)}
.btn-save{padding:8px 18px;font-size:13px;font-weight:500;border-radius:var(--rsm);border:none;background:var(--teal);color:#fff;cursor:pointer;font-family:inherit}
.btn-save:hover{background:var(--teal-dark)}
.btn-save:disabled{background:#ccc;cursor:not-allowed}
.btn-close-job{padding:8px 16px;font-size:13px;font-weight:500;border-radius:var(--rsm);border:1px solid var(--green);background:transparent;color:var(--green);cursor:pointer;font-family:inherit}
.btn-close-job:hover{background:#F0FFF5}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);line-height:1}
.close-btn:hover{color:var(--text)}
.gate-error{grid-column:1/-1;background:#FFEBEB;border:1px solid #F5B8B8;border-radius:var(--rsm);padding:13px 15px}
.gate-error-title{font-size:13px;font-weight:600;color:#cc2222;margin-bottom:8px}
.gate-error-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.gate-error-list li{font-size:12px;color:#991111;display:flex;align-items:center;gap:7px}
.gate-error-list li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--red);flex-shrink:0}
.pst-banner{grid-column:1/-1;background:#FFF8EB;border:1px solid #FFD080;border-radius:var(--rsm);padding:10px 14px;font-size:12px;color:#8a5c00;display:flex;align-items:center;gap:8px}
.contacts-block{grid-column:1/-1;display:flex;flex-direction:column;gap:7px}
.contact-entry{display:grid;grid-template-columns:1fr 150px 28px;gap:6px;align-items:center}
.contact-entry select{font-size:13px;padding:6px 8px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit}
.rm-btn{width:28px;height:28px;border-radius:var(--rsm);border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.rm-btn:hover{color:var(--red);border-color:#F5B8B8}
.add-row-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--blue);background:transparent;border:1px dashed var(--border);border-radius:var(--rsm);padding:5px 10px;cursor:pointer;font-family:inherit}
.add-row-btn:hover{background:var(--surface2)}
.inline-add{display:flex;gap:6px;margin-top:2px}
.inline-add input{flex:1;font-size:13px;padding:6px 8px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit}
.inline-add button{padding:5px 10px;font-size:12px;border-radius:var(--rsm);border:1px solid var(--border);cursor:pointer;background:var(--surface);color:var(--text);font-family:inherit}
.map-field{grid-column:1/-1}
.loc-input-wrap{position:relative;margin-bottom:6px}
.loc-ac{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);z-index:1000;overflow:hidden;margin-top:2px;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.loc-ac-item{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid #F0F0EE}
.loc-ac-item:last-child{border-bottom:none}
.loc-ac-item:hover{background:var(--surface2)}
.map-container{width:100%;height:240px;border-radius:var(--rsm);border:1px solid var(--border);overflow:hidden}
.map-note{font-size:11px;color:var(--text2);margin-top:4px;margin-bottom:6px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.2s;pointer-events:none}
.toast.show{opacity:1}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--text3);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.report-wrap{padding:20px}
.report-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.report-header h2{font-size:18px;font-weight:600}
.report-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.report-section-head{padding:13px 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.report-section-head h3{font-size:14px;font-weight:600}
.report-section-body{padding:16px}
.report-stat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:4px}
.report-stat{text-align:center;padding:13px;background:var(--surface2);border-radius:10px}
.report-stat-value{font-size:26px;font-weight:300;margin-bottom:3px;letter-spacing:-0.02em}
.report-stat-label{font-size:12px;color:var(--text2)}
.report-table{width:100%;border-collapse:collapse;font-size:13px}
.report-table th{text-align:left;font-size:11px;font-weight:600;color:var(--text2);padding:6px 8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.04em}
.report-table td{padding:8px;border-bottom:1px solid #F0F0EE}
.report-table tr:last-child td{border-bottom:none}
.chip{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.chip-ok{background:#E0F5EC;color:#1a7a4a}.chip-miss{background:#FFEBEB;color:#cc2222}.chip-na{background:#F0F0EE;color:#666}
.pb-wrap{background:#F0F0EE;border-radius:20px;height:7px;overflow:hidden;margin:7px 0 3px}
.pb-fill{height:100%;border-radius:20px}
.email-preview{background:var(--surface2);border-radius:10px;padding:15px;font-size:13px;line-height:1.8;color:var(--text2);border:1px solid var(--border)}
</style>
</head>
<body>

<div class="topbar">
  <img class="tb-logo" src="Horizontal_White_on_Teal_RD.png" alt="RDCO" onerror="this.style.display='none';document.getElementById('tb-fb').style.display='block'">
  <span class="tb-fb" id="tb-fb">Red Deer Carpet One</span>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('projects',this)">Projects</button>
    <button class="nav-tab" onclick="switchTab('archive',this)">Completed</button>
    <button class="nav-tab" onclick="switchTab('report',this)">Monthly report</button>
  </div>
</div>

<div id="tab-projects">
  <div class="metrics" id="metrics"></div>
  <div class="toolbar">
    <select id="f-status" onchange="renderTable()">
      <option value="">All statuses</option>
      <option>Not Started</option>
      <option>In Progress</option>
      <option>On Hold</option>
      <option>Overdue</option>
    </select>
    <select id="f-pm" onchange="renderTable()"><option value="">All PMs</option></select>
    <select id="f-alert" onchange="renderTable()"><option value="">All projects</option><option value="alerts">Alerts only</option></select>
    <input id="f-search" placeholder="Search project or client…" oninput="renderTable()" style="width:190px">
    <div class="col-picker" id="col-picker">
      <button class="tbtn" onclick="toggleColPicker()" id="col-btn">Columns</button>
      <div class="col-dropdown" id="col-dropdown" style="display:none"></div>
    </div>
    <button class="btn-add" onclick="openModal()">+ Add project</button>
  </div>
  <div class="alert-legend">
    <span style="font-weight:600;font-size:11px;margin-right:4px">Alerts:</span>
    <span class="leg-item"><span class="alert-dot a-ok"></span> OK</span>
    <span class="leg-item"><span class="alert-dot a-warn"></span> Warning</span>
    <span class="leg-item"><span class="alert-dot a-crit"></span> Critical</span>
    <span class="leg-item"><span class="alert-dot a-na"></span> N/A</span>
    <span style="margin-left:6px;font-size:11px;color:var(--text3)">Design · Materials · ETA · Start-up</span>
  </div>
  <div class="table-wrap">
    <table><thead><tr id="thead-row"></tr></thead>
    <tbody id="tbody"><tr><td colspan="10"><div class="loading"><div class="spinner"></div>Loading…</div></td></tr></tbody>
    </table>
  </div>
</div>

<div id="tab-archive" style="display:none">
  <div class="archive-wrap">
    <div style="padding:16px 0 10px">
      <input class="archive-search" id="archive-search" placeholder="Search completed jobs…" oninput="renderArchive()">
    </div>
    <table>
      <thead><tr><th>Project</th><th>Client</th><th>Our PM</th><th>Value</th><th>Start margin</th><th>End margin</th><th>Variance</th><th>Completed</th><th>Installer</th><th></th></tr></thead>
      <tbody id="archive-tbody"></tbody>
    </table>
  </div>
</div>

<div id="tab-report" style="display:none">
  <div class="report-wrap" id="report-content"></div>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyLnBcgtkwdozdALNy8URu6WAp09vsoTRUxFyS82AWsXNIOvIv0sM27-iLuifxVHtzB2g/exec';
const OUR_PMS=['Matt Balson','Mallory Dubois','Doug Hingley','Mark Stetson'];
const STATUSES=['Not Started','In Progress','On Hold','Overdue','Completed'];
const ROLES=['Client PM','Site Super','Owner Rep','Estimator','Other'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const PST_PROVINCES=['BC','SK','MB','ON','QC','NB','NS','PEI','NL'];

const ALL_COLS=[
  {key:'alerts',label:'Alerts',locked:true,visible:true},
  {key:'project',label:'Project',locked:true,visible:true},
  {key:'status',label:'Status',locked:false,visible:true},
  {key:'ourPM',label:'Our PM',locked:false,visible:true},
  {key:'contacts',label:'Client contacts',locked:false,visible:true},
  {key:'value',label:'Value',locked:false,visible:true},
  {key:'margin',label:'Margin',locked:false,visible:true},
  {key:'installStart',label:'Install start',locked:false,visible:true},
  {key:'installer',label:'Installer',locked:false,visible:true},
  {key:'changeOrders',label:'Change orders',locked:false,visible:false},
  {key:'schedulePro',label:'Schedule Pro',locked:false,visible:false},
  {key:'warrantyStatus',label:'Warranty',locked:false,visible:false},
];

let projects=[], contactsList=[], installersList=[], clientsList=[], listData={};
let editId=null, colPickerOpen=false;
let modalContacts=[], showAddContact=false, showAddInstaller=false, showAddClient=false;
let locInput='', locLat=null, locLng=null, locMap=null, locMarker=null;
let gateErrors=[], currentTab='projects';
let reportMonth=new Date().getMonth(), reportYear=new Date().getFullYear();

function today(){return new Date().toISOString().split('T')[0]}
function daysDiff(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function cleanDate(val){
  if(!val)return'';
  if(typeof val==='string'){const m=val.match(/(\d{4}-\d{2}-\d{2})/);return m?m[1]:val;}
  if(val instanceof Date)return val.toISOString().split('T')[0];
  return String(val).split('T')[0];
}
function fmt$(n,s){if(s){if(n>=1000000)return'$'+(n/1000000).toFixed(1)+'M';if(n>=1000)return'$'+Math.round(n/1000)+'K';}return'$'+Math.round(n||0).toLocaleString();}
function fmtP(n){const f=parseFloat(n);return isNaN(f)?'—':(f*100).toFixed(1)+'%'}
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.style.background=type==='error'?'#cc2222':'#1C1C1E';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

function api(params){
  return new Promise((resolve,reject)=>{
    const cbName='cb_'+Math.random().toString(36).slice(2);
    const url=new URL(SCRIPT_URL);
    Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,String(v)));
    url.searchParams.set('callback',cbName);
    const script=document.createElement('script');
    const timer=setTimeout(()=>{
      cleanup();
      reject(new Error('Request timed out'));
    },30000);
    window[cbName]=function(data){
      cleanup();
      resolve(data);
    };
    function cleanup(){
      clearTimeout(timer);
      delete window[cbName];
      if(script.parentNode)script.parentNode.removeChild(script);
    }
    script.src=url.toString();
    script.onerror=()=>{cleanup();reject(new Error('Script load error'));};
    document.head.appendChild(script);
  });
}

async function loadData(){
  try{
    const data=await api({action:'getAllData'});
    if(data.error)throw new Error(data.error);
    projects=(data.projects||[]).map(p=>{
      ['Install Start','Completed Date','Design Date','Critical ETA','Startup Meeting','Warranty Date'].forEach(f=>{if(p[f])p[f]=cleanDate(p[f]);});
      return p;
    });
    contactsList=(data.contacts||[]).map(c=>typeof c==='string'?{name:c,company:'',role:''}:{name:c.Name||c.name||'',company:'',role:''});
    installersList=(data.installers||[]).map(i=>typeof i==='string'?i:(i.Name||'')).filter(Boolean);
    clientsList=(data.clients||[]).map(c=>typeof c==='string'?c:(c.Name||c)).filter(Boolean);
    listData=data.lists||{};
    populatePMFilter();
    renderMetrics();
    renderTable();
  }catch(e){
    console.error('loadData error:',e);
    document.getElementById('tbody').innerHTML=`<tr><td colspan="10" class="empty">Could not connect to Google Sheets. ${e.message}</td></tr>`;
  }
}

function getAlerts(p){
  const a={design:'na',materials:'na',eta:'na',startup:'na'};
  if(p['Job Status']==='Completed')return a;
  const t=today(), dts=p['Install Start']?daysDiff(t,p['Install Start']):999;
  if(p['Design Required']==='true'||p['Design Required']===true)
    a.design=p['Design Status']==='Completed'?'ok':dts<14?'crit':'warn';
  const mo=p['Materials Ordered'];
  a.materials=mo==='Delivered'?'ok':mo==='Ordered'?(dts<7?'warn':'ok'):(dts<21?'crit':dts<42?'warn':'ok');
  if(p['Critical ETA']){const de=daysDiff(t,p['Critical ETA']);a.eta=de<0?(mo==='Delivered'?'ok':'crit'):de<7?'warn':'ok';}
  const val=parseFloat(p['Value'])||0;
  if(val>=50000){
    if(!p['Startup Meeting'])a.startup=dts<7?'crit':dts<14?'warn':'ok';
    else a.startup=daysDiff(p['Startup Meeting'],p['Install Start']||p['Startup Meeting'])>=7?'ok':'warn';
  }
  return a;
}
function hasAlert(p){return Object.values(getAlerts(p)).some(v=>v==='warn'||v==='crit')}
function statusBadge(s){
  const m={'Not Started':'b-ns','In Progress':'b-prog','On Hold':'b-hold','Overdue':'b-over','Completed':'b-done'};
  return`<span class="badge ${m[s]||'b-ns'}">${s||'—'}</span>`;
}
function getContacts(p){
  try{
    const c=p['Contacts'];
    if(Array.isArray(c))return c;
    if(typeof c==='string'&&c)return JSON.parse(c);
    return[];
  }catch{return[];}
}
function extractProvince(location){
  if(!location)return'AB';
  const pm={', Alberta,':'AB',', AB,':'AB','British Columbia':'BC',', BC,':'BC',', Saskatchewan,':'SK',', SK,':'SK',', Manitoba,':'MB',', MB,':'MB',', Ontario,':'ON',', ON,':'ON',', Quebec,':'QC',', QC,':'QC','New Brunswick':'NB','Nova Scotia':'NS','Prince Edward Island':'PEI','Newfoundland':'NL'};
  for(const[k,v] of Object.entries(pm)){if(location.includes(k))return v;}
  return'AB';
}

  const ml=closed.filter(p=>p['Ending Margin']!=null&&p['Ending Margin']!==''&&p['Starting Margin']!=null&&p['Starting Margin']!=='');

function validateCloseOut(data){
  const errors=[];
  if(data['Ending Margin']===''||data['Ending Margin']==null)errors.push('Ending margin % is required');
  if(!data['Completed Date'])errors.push('Completed date is required');
  if(!data['Installer'])errors.push('Installer must be assigned');
  if((parseFloat(data['Value'])||0)>=50000&&!data['Startup Meeting'])errors.push('Start-up meeting date required (job over $50K)');
  if(data['Warranty Status']!=='Completed')errors.push('Warranty package must be marked Completed');
  if(!data['Warranty Date'])errors.push('Warranty delivered date is required');
  if(PST_PROVINCES.includes(data['Province']||'AB')&&data['PST Remitted']!=='Yes')errors.push(`PST must be remitted for ${data['Province']} jobs`);
  return errors;
}

async function openModal(id){
  if(!clientsList.length||!installersList.length){
    try{
      const data=await api({action:'getAllData'});
      if(data.error)throw new Error(data.error);
      projects=(data.projects||[]).map(p=>{['Install Start','Completed Date','Design Date','Critical ETA','Startup Meeting','Warranty Date'].forEach(f=>{if(p[f])p[f]=cleanDate(p[f]);});return p;});
      contactsList=(data.contacts||[]).map(c=>typeof c==='string'?{name:c,company:'',role:''}:{name:c.Name||c.name||'',company:'',role:''});
      installersList=(data.installers||[]).map(i=>typeof i==='string'?i:(i.Name||'')).filter(Boolean);
      clientsList=(data.clients||[]).map(c=>typeof c==='string'?c:(c.Name||c)).filter(Boolean);
      listData=data.lists||{};
    }catch(e){console.error('Failed to refresh data',e);}
  }
  editId=id||null;
  const p=id?projects.find(x=>String(x['ID'])===String(id)):null;
  modalContacts=p?getContacts(p):[{name:'',role:''}];
  if(!modalContacts.length)modalContacts=[{name:'',role:''}];
  showAddContact=false;showAddInstaller=false;showAddClient=false;
  locInput=p?p['Location']||'':'';
  locLat=p&&p['Latitude']?parseFloat(p['Latitude'])||null:null;
  locLng=p&&p['Longitude']?parseFloat(p['Longitude'])||null:null;
  if(locMap){locMap.remove();locMap=null;locMarker=null;}
  gateErrors=[];
  renderModal();
}

function initMap(){
  const el=document.getElementById('leaflet-map');
  if(!el||locMap)return;
  const lat=locLat||52.268, lng=locLng||(-113.811), zoom=locLat?13:6;
  locMap=L.map('leaflet-map').setView([lat,lng],zoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(locMap);
  if(locLat&&locLng){
    locMarker=L.marker([locLat,locLng],{draggable:true}).addTo(locMap);
    locMarker.on('dragend',e=>{const ll=e.target.getLatLng();locLat=parseFloat(ll.lat.toFixed(6));locLng=parseFloat(ll.lng.toFixed(6));updateMapNote();});
  }
  locMap.on('click',e=>{
    locLat=parseFloat(e.latlng.lat.toFixed(6));
    locLng=parseFloat(e.latlng.lng.toFixed(6));
    if(locMarker)locMap.removeLayer(locMarker);
    locMarker=L.marker([locLat,locLng],{draggable:true}).addTo(locMap);
    locMarker.on('dragend',ev=>{const ll=ev.target.getLatLng();locLat=parseFloat(ll.lat.toFixed(6));locLng=parseFloat(ll.lng.toFixed(6));updateMapNote();});
    if(!locInput){
      locInput=`${locLat.toFixed(3)}, ${locLng.toFixed(3)}`;
      const inp=document.getElementById('f-location');
      if(inp)inp.value=locInput;
    }
    updateMapNote();
  });
}

function updateMapNote(){
  const n=document.getElementById('map-note');
  if(n&&locLat)n.textContent=`Pinned: ${locInput||'Custom location'} (${locLat.toFixed(3)}, ${locLng.toFixed(3)})`;
}

let acTimer=null;
function handleLocSearch(val){
  locInput=val;
  clearTimeout(acTimer);
  const ac=document.getElementById('loc-ac');
  if(val.length<2){ac.style.display='none';return;}
  acTimer=setTimeout(async()=>{
    try{
      const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val)}&limit=5&countrycodes=ca`,{headers:{'Accept-Language':'en'}});
      const results=await res.json();
      if(!results.length){ac.style.display='none';return;}
      ac.style.display='block';
      ac.innerHTML=results.map(r=>`<div class="loc-ac-item" onclick="selectLocResult('${encodeURIComponent(r.lat)}','${encodeURIComponent(r.lon)}','${encodeURIComponent(r.display_name)}')">${r.display_name}</div>`).join('');
    }catch{ac.style.display='none';}
  },400);
}

function selectLocResult(lat,lng,name){
  locLat=parseFloat(decodeURIComponent(lat));
  locLng=parseFloat(decodeURIComponent(lng));
  locInput=decodeURIComponent(name);
  const inp=document.getElementById('f-location');
  if(inp)inp.value=locInput;
  document.getElementById('loc-ac').style.display='none';
  updateMapNote();
  if(locMap){
    if(locMarker)locMap.removeLayer(locMarker);
    locMarker=L.marker([locLat,locLng],{draggable:true}).addTo(locMap);
    locMarker.on('dragend',e=>{const ll=e.target.getLatLng();locLat=parseFloat(ll.lat.toFixed(6));locLng=parseFloat(ll.lng.toFixed(6));updateMapNote();});
    locMap.setView([locLat,locLng],13);
  }
}

function closeJob(){
  document.getElementById('f-status').value='Completed';
  onStatusChange('Completed');
  saveProject();
}

function addContactRow(){modalContacts.push({name:'',role:'Site Super'});renderModal();}
function removeContact(i){if(modalContacts.length>1)modalContacts.splice(i,1);else modalContacts[0]={name:'',role:''};renderModal();}
function startNewContact(){showAddContact=true;renderModal();setTimeout(()=>document.getElementById('new-contact-inp')?.focus(),10);}
function cancelNewContact(){showAddContact=false;renderModal();}
function confirmNewContact(){
  const val=document.getElementById('new-contact-inp')?.value?.trim();
  if(!val)return;
  const last=modalContacts[modalContacts.length-1];
  if(!last.name)last.name=val;else modalContacts.push({name:val,role:'Site Super'});
  if(!contactsList.find(c=>(c.name||c)===val)){
    contactsList.push({name:val,company:'',role:''});
    api({action:'addContact',contact:JSON.stringify({Name:val,Company:'',Role:''})});
  }
  showAddContact=false;renderModal();
}
function startNewInstaller(){showAddInstaller=true;renderModal();setTimeout(()=>document.getElementById('new-inst-inp')?.focus(),10);}
function cancelNewInstaller(){showAddInstaller=false;renderModal();}
function confirmNewInstaller(){
  const val=document.getElementById('new-inst-inp')?.value?.trim();
  if(!val)return;
  if(!installersList.includes(val)){installersList.push(val);api({action:'addInstaller',name:val});}
  showAddInstaller=false;renderModal();
  setTimeout(()=>{const s=document.getElementById('f-installer');if(s)s.value=val;},20);
}
function startNewClient(){showAddClient=true;renderModal();setTimeout(()=>document.getElementById('new-client-inp')?.focus(),10);}
function cancelNewClient(){showAddClient=false;renderModal();}
function confirmNewClient(){
  const val=document.getElementById('new-client-inp')?.value?.trim();
  if(!val)return;
  if(!clientsList.includes(val)){
    clientsList.push(val);
    api({action:'addClient',name:val});
  }
  showAddClient=false;renderModal();
  setTimeout(()=>{const s=document.getElementById('f-client');if(s)s.value=val;},20);
}

function closeModal(){
  if(locMap){locMap.remove();locMap=null;locMarker=null;}
  document.getElementById('modal-root').innerHTML='';
  gateErrors=[];
}

async function saveProject(){
  const g=id=>{const el=document.getElementById(id);if(!el)return'';return(el.value||'').trim();};
  const gn=id=>{const el=document.getElementById(id);if(!el)return'';const v=parseFloat(el.value);return isNaN(v)?'':v;};
  const gb=id=>{const el=document.getElementById(id);return el?el.value==='true':false;};
  const existingP=editId?projects.find(x=>String(x['ID'])===String(editId)):null;
  const locVal=document.getElementById('f-location')?.value||locInput||'';
  const province=extractProvince(locVal);
  const finalContacts=modalContacts.filter(c=>c&&c.name);

  const data={
    'ID':existingP?existingP['ID']:'',
    'Project Name':g('f-name'),
    'Client':g('f-client'),
    'Our PM':g('f-ourPM'),
    'Province':province,
    'Location':locVal,
    'Latitude':locLat!=null?locLat:'',
    'Longitude':locLng!=null?locLng:'',
    'Value':gn('f-value'),
    'Job Status':g('f-status')||'Not Started',
    'Starting Margin':gn('f-startM')!==''?gn('f-startM')/100:'',
    'Ending Margin':gn('f-endM')!==''?gn('f-endM')/100:'',
    'Change Orders':parseInt(g('f-co'))||0,
    'Install Start':g('f-start'),
    'Installer':g('f-installer'),
    'Schedule Pro':gb('f-schedpro'),
    'Completed Date':g('f-completed'),
    'Design Required':gb('f-designReq'),
    'Design Date':g('f-designDate'),
    'Design Status':g('f-designStatus'),
    'Materials Ordered':g('f-mats'),
    'Critical ETA':g('f-eta'),
    'ETA Notes':g('f-etaNotes'),
    'Startup Meeting':g('f-startup'),
    'Warranty Status':g('f-warr'),
    'Warranty Date':g('f-warrDate'),
    'Contacts':JSON.stringify(finalContacts),
    'PST Remitted':g('f-pst'),
    'Comments':g('f-comments'),
  };

  if(data['Job Status']==='Completed'){
    gateErrors=validateCloseOut({...data,Province:province});
    if(gateErrors.length){renderModal();return;}
  }

  const btn=document.getElementById('btn-save');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}

  try{
    const result=await api({action:'saveProject',project:JSON.stringify(data)});
    if(result.error)throw new Error(result.error);
    showToast('Project saved successfully');
    closeModal();
    await loadData();
    if(currentTab==='archive')renderArchive();
  }catch(e){
    showToast('Save failed — '+e.message,'error');
    if(btn){btn.disabled=false;btn.textContent='Save project';}
  }
}

async function deleteProject(id){
  if(!confirm('Remove this project from the tracker?'))return;
  try{
    await api({action:'deleteProject',id});
    showToast('Project deleted');
    closeModal();
    await loadData();
    if(currentTab==='archive')renderArchive();
  }catch(e){showToast('Delete failed','error');}
}

function renderReport(){
  const el=document.getElementById('report-content');
  const mName=MONTHS[reportMonth];
  const closed=projects.filter(p=>{
    if(!p['Completed Date'])return false;
    const d=new Date(p['Completed Date']);
    return d.getMonth()===reportMonth&&d.getFullYear()===reportYear;
  });
  const allClosed=projects.filter(p=>p['Completed Date']);
  const suElig=allClosed.filter(p=>(parseFloat(p['Value'])||0)>=50000);
  const suHit=suElig.filter(p=>p['Startup Meeting']&&p['Install Start']&&daysDiff(p['Startup Meeting'],p['Install Start'])>=7);
  const suRate=suElig.length?Math.round(suHit.length/suElig.length*100):100;
  const mJobs=allClosed.filter(p=>p['Ending Margin']!=null&&p['Ending Margin']!==''&&p['Starting Margin']!=null&&p['Starting Margin']!=='');
  const mPass=mJobs.filter(p=>(parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin']))>=-0.05);
  const mRate=mJobs.length?Math.round(mPass.length/mJobs.length*100):100;
  const totalValue=closed.reduce((s,p)=>s+(parseFloat(p['Value'])||0),0);
  const avgMV=mJobs.length?mJobs.reduce((s,p)=>s+(parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin'])),0)/mJobs.length:0;
  const monthOpts=MONTHS.map((m,i)=>`<option value="${i}" ${i===reportMonth?'selected':''}>${m}</option>`).join('');
  const yearOpts=[2024,2025,2026,2027].map(y=>`<option ${y===reportYear?'selected':''}>${y}</option>`).join('');
  function bc(r){return r===100?'var(--green)':r>=80?'var(--orange)':'var(--red)'}

  el.innerHTML=`
  <div class="report-header">
    <div><h2>${mName} ${reportYear} — Operations Report</h2><div style="font-size:12px;color:var(--text2);margin-top:3px">Red Deer Carpet One Floor & Home</div></div>
    <div style="display:flex;gap:8px">
      <select onchange="reportMonth=parseInt(this.value);renderReport()" style="font-size:13px;padding:5px 8px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface);font-family:inherit">${monthOpts}</select>
      <select onchange="reportYear=parseInt(this.value);renderReport()" style="font-size:13px;padding:5px 8px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface);font-family:inherit">${yearOpts}</select>
    </div>
  </div>
  <div class="report-section">
    <div class="report-section-head"><h3>Month summary — ${mName} ${reportYear}</h3></div>
    <div class="report-section-body">
      <div class="report-stat-grid">
        <div class="report-stat"><div class="report-stat-value">${closed.length}</div><div class="report-stat-label">Jobs closed</div></div>
        <div class="report-stat"><div class="report-stat-value">${fmt$(totalValue,true)}</div><div class="report-stat-label">Revenue closed</div></div>
        <div class="report-stat"><div class="report-stat-value" style="color:${avgMV<0?'var(--red)':'var(--green)'}">${avgMV>=0?'+':''}${(avgMV*100).toFixed(1)}%</div><div class="report-stat-label">Avg margin variance</div></div>
      </div>
      ${closed.length===0?`<div style="text-align:center;padding:12px;font-size:13px;color:var(--text3)">No jobs closed in ${mName} ${reportYear}.</div>`:''}
    </div>
  </div>
  <div class="report-section">
    <div class="report-section-head"><h3>Benchmark 1 — Start-up meeting</h3><span class="chip ${suRate===100?'chip-ok':suRate>=80?'chip-na':'chip-miss'}">${suRate}%</span></div>
    <div class="report-section-body">
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">≥7 days prior on jobs over $50,000</div>
      <div class="pb-wrap"><div class="pb-fill" style="width:${suRate}%;background:${bc(suRate)}"></div></div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px">${suHit.length} of ${suElig.length} eligible jobs</div>
      ${suElig.length?`<table class="report-table"><thead><tr><th>Project</th><th>PM</th><th>Value</th><th>Meeting</th><th>Install start</th><th>Lead days</th><th>Result</th></tr></thead><tbody>
      ${suElig.map(p=>{const lead=p['Startup Meeting']&&p['Install Start']?daysDiff(p['Startup Meeting'],p['Install Start']):null;const hit=lead!=null&&lead>=7;return`<tr><td style="font-weight:600">${p['Project Name']}</td><td>${p['Our PM']}</td><td>${fmt$(p['Value'])}</td><td>${p['Startup Meeting']||'—'}</td><td>${p['Install Start']||'—'}</td><td>${lead!=null?lead+'d':'—'}</td><td><span class="chip ${hit?'chip-ok':'chip-miss'}">${hit?'Met':'Missed'}</span></td></tr>`;}).join('')}
      </tbody></table>`:''}
    </div>
  </div>
  <div class="report-section">
    <div class="report-section-head"><h3>Benchmark 2 — Margin protection</h3><span class="chip ${mRate===100?'chip-ok':mRate>=80?'chip-na':'chip-miss'}">${mRate}%</span></div>
    <div class="report-section-body">
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">Loss no greater than 5% per job</div>
      <div class="pb-wrap"><div class="pb-fill" style="width:${mRate}%;background:${bc(mRate)}"></div></div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px">${mPass.length} of ${mJobs.length} closed jobs</div>
      ${mJobs.length?`<table class="report-table"><thead><tr><th>Project</th><th>PM</th><th>Start margin</th><th>End margin</th><th>Variance</th><th>Change orders</th><th>Result</th></tr></thead><tbody>
      ${mJobs.map(p=>{const mv=parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin']);const hit=mv>=-0.05;return`<tr><td style="font-weight:600">${p['Project Name']}</td><td>${p['Our PM']}</td><td>${fmtP(p['Starting Margin'])}</td><td>${fmtP(p['Ending Margin'])}</td><td class="${mv<0?'val-lo':'val-hi'}">${mv>=0?'+':''}${(mv*100).toFixed(1)}%</td><td>${p['Change Orders']||0}</td><td><span class="chip ${hit?'chip-ok':'chip-miss'}">${hit?'Met':'Missed'}</span></td></tr>`;}).join('')}
      </tbody></table>`:''}
    </div>
  </div>
  <div class="report-section">
    <div class="report-section-head"><h3>Auto-email preview</h3></div>
    <div class="report-section-body">
      <div class="email-preview">
        <div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)"><strong>To:</strong> CEO Admin &nbsp;·&nbsp; <strong>Subject:</strong> RDCO Operations Report — ${mName} ${reportYear}</div>
        Hi,<br><br>Automated operations report for <strong>${mName} ${reportYear}</strong>.<br><br>
        <strong>Jobs closed:</strong> ${closed.length} &nbsp;·&nbsp; <strong>Revenue:</strong> ${fmt$(totalValue)}<br>
        <strong>Benchmark 1 — Start-up meeting:</strong> ${suRate}% (${suHit.length}/${suElig.length} eligible jobs)<br>
        <strong>Benchmark 2 — Margin protection:</strong> ${mRate}% (${mPass.length}/${mJobs.length} jobs)<br><br>
        ${mJobs.filter(p=>(parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin']))<-0.05).map(p=>`• ${p['Project Name']} — ${((parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin']))*100).toFixed(1)}% variance`).join('<br>')}
        <br>— Automated report, RDCO Project Operations
      </div>
    </div>
  </div>`;
}

document.addEventListener('click',e=>{
  if(colPickerOpen&&!document.getElementById('col-picker')?.contains(e.target)){
    colPickerOpen=false;
    const dd=document.getElementById('col-dropdown');if(dd)dd.style.display='none';
    document.getElementById('col-btn')?.classList.remove('active');
  }
  const ac=document.getElementById('loc-ac');
  if(ac&&!ac.contains(e.target)&&e.target.id!=='f-location')ac.style.display='none';
});

loadData();
</script>
</body>
</html>
