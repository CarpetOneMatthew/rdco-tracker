<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDCO Project Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f3;min-height:100vh}
a{color:inherit;text-decoration:none}
.topbar{background:#fff;border-bottom:1px solid #e5e5e3;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar-left{display:flex;flex-direction:column}
.topbar-title{font-size:16px;font-weight:600;color:#1a1a1a}
.topbar-sub{font-size:12px;color:#888;margin-top:1px}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:6px 14px;font-size:13px;border-radius:8px;border:1px solid transparent;cursor:pointer;background:transparent;color:#666;font-family:inherit}
.nav-tab:hover{background:#f5f5f3}
.nav-tab.active{background:#f5f5f3;border-color:#ddd;color:#1a1a1a;font-weight:500}
.view{display:none}.view.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:16px 20px}
.metric{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e5e5e3}
.metric-label{font-size:12px;color:#888;margin-bottom:4px}
.metric-value{font-size:24px;font-weight:600}
.metric-sub{font-size:11px;color:#aaa;margin-top:2px}
.toolbar{display:flex;align-items:center;gap:8px;padding:0 20px 12px;flex-wrap:wrap}
.toolbar select,.toolbar input{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;height:32px;font-family:inherit}
.toolbar select:focus,.toolbar input:focus{outline:none;border-color:#999}
.tbtn{padding:6px 12px;font-size:13px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;height:32px;white-space:nowrap;font-family:inherit}
.tbtn:hover{background:#f5f5f3}
.tbtn.active{background:#f5f5f3;border-color:#999}
.btn-primary{padding:6px 16px;font-size:13px;font-weight:500;border-radius:8px;border:1px solid #ddd;background:#1a1a1a;color:#fff;cursor:pointer;height:32px;margin-left:auto;font-family:inherit}
.btn-primary:hover{background:#333}
.col-picker{position:relative;display:inline-block}
.col-dropdown{position:absolute;top:36px;right:0;background:#fff;border:1px solid #ddd;border-radius:12px;padding:8px;min-width:210px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.col-dropdown-title{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;padding:2px 6px 8px}
.col-opt{display:flex;align-items:center;gap:8px;padding:6px 6px;border-radius:8px;cursor:pointer;font-size:13px}
.col-opt:hover{background:#f5f5f3}
.col-opt.locked{opacity:0.4;cursor:default}
.col-opt input{width:14px;height:14px;cursor:pointer;flex-shrink:0;accent-color:#1a1a1a}
.table-wrap{overflow-x:auto;padding:0 20px 20px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;border:1px solid #e5e5e3;font-size:13px}
thead tr{border-bottom:1px solid #e5e5e3}
th{padding:10px 12px;text-align:left;font-weight:500;font-size:12px;color:#888;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #f0f0ee;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.completed td{opacity:0.5}
tr.completed .pname{text-decoration:line-through}
tr:hover td{background:#fafaf8;cursor:pointer}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-notstart{background:#EBF4FF;color:#1a6bbf}
.b-hold{background:#FFF8EB;color:#996600}
.b-overdue{background:#FFEBEB;color:#cc2222}
.b-complete{background:#F0F0EE;color:#666}
.b-prog{background:#F0EEFF;color:#5533cc}
.alert-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.a-ok{background:#22a06b}.a-warn{background:#e8a020}.a-crit{background:#e02020}.a-na{background:#ccc}
.alert-cell{display:flex;gap:4px;align-items:center}
.alert-pill{display:inline-flex;align-items:center;padding:1px 6px;border-radius:20px;font-size:10px;font-weight:500;margin-left:2px}
.ap-warn{background:#FFF3D6;color:#8a5c00}.ap-crit{background:#FFEBEB;color:#cc2222}
.val-hi{color:#22a06b;font-weight:500}.val-lo{color:#e02020;font-weight:500}
.alert-legend{display:flex;gap:12px;align-items:center;padding:0 20px 8px;font-size:11px;color:#888}
.legend-item{display:flex;align-items:center;gap:4px}
.empty{text-align:center;padding:40px;color:#aaa;font-size:13px}
.row-act{cursor:pointer;color:#bbb;font-size:20px;background:none;border:none;padding:0 4px;line-height:1}
.row-act:hover{color:#1a1a1a}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:12px;color:#888;font-size:13px}
.spinner{width:24px;height:24px;border:2px solid #e5e5e3;border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:16px;border:1px solid #e5e5e3;width:640px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.15)}
.modal-head{padding:18px 22px;border-bottom:1px solid #f0f0ee;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:2}
.modal-head h2{font-size:15px;font-weight:600}
.modal-body{padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;color:#666;font-weight:500}
.field label .req{color:#e02020;margin-left:2px;font-size:11px}
.field input,.field select,.field textarea{font-size:13px;padding:8px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-family:inherit;transition:border-color 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#999}
.field input.error,.field select.error{border-color:#e02020;background:#fffafa}
.field textarea{resize:vertical;min-height:64px}
.section-label{grid-column:1/-1;font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid #f0f0ee;padding-bottom:6px;margin-top:6px}
.modal-foot{padding:14px 22px;border-top:1px solid #f0f0ee;display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}
.btn-cancel{padding:8px 16px;font-size:13px;border-radius:8px;border:1px solid #ddd;background:transparent;color:#666;cursor:pointer;font-family:inherit}
.btn-cancel:hover{background:#f5f5f3}
.btn-save{padding:8px 18px;font-size:13px;font-weight:500;border-radius:8px;border:1px solid #ddd;background:#1a1a1a;color:#fff;cursor:pointer;font-family:inherit}
.btn-save:hover{background:#333}
.btn-save:disabled{background:#ccc;cursor:not-allowed}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1;padding:0 2px}
.close-btn:hover{color:#1a1a1a}
.gate-error{grid-column:1/-1;background:#FFEBEB;border:1px solid #f5b8b8;border-radius:10px;padding:14px 16px}
.gate-error-title{font-size:13px;font-weight:600;color:#cc2222;margin-bottom:8px}
.gate-error-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.gate-error-list li{font-size:12px;color:#991111;display:flex;align-items:center;gap:7px}
.gate-error-list li::before{content:'';width:5px;height:5px;border-radius:50%;background:#e02020;flex-shrink:0}
.contact-block{grid-column:1/-1;display:flex;flex-direction:column;gap:8px}
.contact-row-entry{display:grid;grid-template-columns:1fr 150px 28px;gap:6px;align-items:center}
.contact-row-entry select{font-size:13px;padding:6px 8px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-family:inherit}
.remove-btn{width:28px;height:28px;border-radius:8px;border:1px solid #ddd;background:transparent;color:#aaa;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.remove-btn:hover{color:#e02020;border-color:#f5b8b8}
.add-row-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#1a6bbf;background:transparent;border:1px dashed #ddd;border-radius:8px;padding:5px 10px;cursor:pointer;font-family:inherit}
.add-row-btn:hover{background:#f5f5f3}
.inline-add{display:flex;gap:6px;margin-top:4px}
.inline-add input{flex:1;font-size:13px;padding:6px 8px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-family:inherit}
.inline-add button{padding:5px 10px;font-size:12px;border-radius:8px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#1a1a1a;font-family:inherit}
.inline-add button:hover{background:#f5f5f3}
.map-container{grid-column:1/-1;border-radius:10px;border:1px solid #ddd;overflow:hidden;height:170px;position:relative;background:#f5f5f3}
.map-pin-area{position:relative;width:100%;height:100%;cursor:crosshair}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(#e5e5e3 1px,transparent 1px),linear-gradient(90deg,#e5e5e3 1px,transparent 1px);background-size:40px 40px}
.map-dot{position:absolute;width:14px;height:14px;border-radius:50%;background:#e02020;border:2px solid white;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
.map-lbl{position:absolute;font-size:10px;background:#fff;border:1px solid #ddd;border-radius:4px;padding:2px 6px;transform:translate(-50%,8px);white-space:nowrap;pointer-events:none;font-family:inherit}
.map-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#aaa;font-size:12px}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:10px;z-index:30;overflow:hidden;margin-top:3px;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.autocomplete-item{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid #f0f0ee}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover{background:#f5f5f3}
.autocomplete-item.manual{color:#1a6bbf}
.loc-ok{font-size:11px;color:#22a06b;margin-top:4px}
.loc-note{font-size:11px;color:#888;margin-top:4px}
.save-indicator{font-size:12px;color:#22a06b;display:flex;align-items:center;gap:5px}
.save-indicator.saving{color:#888}
.save-indicator.error{color:#e02020}
.report-wrap{padding:20px}
.report-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.report-header h2{font-size:18px;font-weight:600}
.report-controls{display:flex;gap:8px;align-items:center}
.report-section{background:#fff;border:1px solid #e5e5e3;border-radius:12px;margin-bottom:16px;overflow:hidden}
.report-section-head{padding:14px 18px;border-bottom:1px solid #f0f0ee;display:flex;align-items:center;justify-content:space-between}
.report-section-head h3{font-size:14px;font-weight:600}
.report-section-body{padding:18px}
.report-stat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:4px}
.report-stat{text-align:center;padding:14px;background:#f5f5f3;border-radius:10px}
.report-stat-value{font-size:26px;font-weight:600;margin-bottom:4px}
.report-stat-label{font-size:12px;color:#888}
.report-table{width:100%;border-collapse:collapse;font-size:13px}
.report-table th{text-align:left;font-size:11px;font-weight:600;color:#888;padding:6px 8px;border-bottom:1px solid #e5e5e3;text-transform:uppercase;letter-spacing:0.04em}
.report-table td{padding:9px 8px;border-bottom:1px solid #f0f0ee}
.report-table tr:last-child td{border-bottom:none}
.chip{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.chip-ok{background:#E0F5EC;color:#1a7a4a}.chip-miss{background:#FFEBEB;color:#cc2222}.chip-na{background:#F0F0EE;color:#666}.chip-warn{background:#FFF3D6;color:#8a5c00}
.progress-bar-wrap{background:#f0f0ee;border-radius:20px;height:8px;overflow:hidden;margin:8px 0 4px}
.progress-bar{height:100%;border-radius:20px;background:#22a06b;transition:width 0.4s}
.progress-bar.warn{background:#e8a020}.progress-bar.bad{background:#e02020}
.email-preview{background:#f5f5f3;border-radius:10px;padding:16px;font-size:13px;line-height:1.8;color:#666;border:1px solid #e5e5e3}
.email-preview strong{color:#1a1a1a}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.2s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="app">
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">Project Operations Tracker</div>
    <div class="topbar-sub">Red Deer Carpet One Floor & Home</div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('projects',this)">Projects</button>
    <button class="nav-tab" onclick="switchView('report',this)">Monthly report</button>
  </div>
</div>

<div class="view active" id="view-projects">
  <div class="metrics" id="metrics"></div>
  <div class="toolbar">
    <select id="filter-status" onchange="renderTable()">
      <option value="">All statuses</option>
      <option>Not Started</option><option>In Progress</option>
      <option>On Hold</option><option>Overdue</option><option>Completed</option>
    </select>
    <select id="filter-pm" onchange="renderTable()">
      <option value="">All our PMs</option>
    </select>
    <select id="filter-alert" onchange="renderTable()">
      <option value="">All projects</option>
      <option value="alerts">Alerts only</option>
    </select>
    <input id="filter-search" placeholder="Search project or client…" oninput="renderTable()" style="width:190px">
    <div class="col-picker" id="col-picker">
      <button class="tbtn" onclick="toggleColPicker()" id="col-btn">Columns</button>
      <div class="col-dropdown" id="col-dropdown" style="display:none"></div>
    </div>
    <button class="btn-primary" onclick="openModal()">+ Add project</button>
  </div>
  <div class="alert-legend">
    <span style="font-weight:600;font-size:11px;margin-right:4px">Alerts:</span>
    <span class="legend-item"><span class="alert-dot a-ok"></span> OK</span>
    <span class="legend-item"><span class="alert-dot a-warn"></span> Warning</span>
    <span class="legend-item"><span class="alert-dot a-crit"></span> Critical</span>
    <span class="legend-item"><span class="alert-dot a-na"></span> N/A</span>
    <span style="margin-left:6px;font-size:11px;color:#aaa">Design · Materials · ETA · Start-up</span>
  </div>
  <div class="table-wrap">
    <table id="main-table">
      <thead><tr id="thead-row"></tr></thead>
      <tbody id="tbody"><tr><td colspan="10"><div class="loading"><div class="spinner"></div>Loading projects…</div></td></tr></tbody>
    </table>
  </div>
</div>

<div class="view" id="view-report">
  <div class="report-wrap" id="report-content"></div>
</div>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz553U8NHVI454HPbbU4HY2PLdw9ElUwz8UXsGUipiy-yzZKC126QoaDfDOMB6kbHZu/exec';

const AB_CITIES=[
  {name:'Red Deer, AB',lat:52.268,lng:-113.811},{name:'Calgary, AB',lat:51.045,lng:-114.057},
  {name:'Edmonton, AB',lat:53.546,lng:-113.494},{name:'Trochu, AB',lat:51.845,lng:-113.226},
  {name:'Innisfail, AB',lat:52.03,lng:-113.957},{name:'Duchess, AB',lat:50.721,lng:-111.889},
  {name:'Lacombe, AB',lat:52.468,lng:-113.738},{name:'Ponoka, AB',lat:52.681,lng:-113.582},
  {name:'Olds, AB',lat:51.793,lng:-114.106},{name:'Camrose, AB',lat:53.017,lng:-112.827},
  {name:'Lethbridge, AB',lat:49.694,lng:-112.833},{name:'Medicine Hat, AB',lat:50.041,lng:-110.677},
  {name:'Grande Prairie, AB',lat:55.171,lng:-118.794},{name:'Canmore, AB',lat:51.089,lng:-115.359},
  {name:'Airdrie, AB',lat:51.292,lng:-114.014},{name:'Sylvan Lake, AB',lat:52.308,lng:-114.097},
  {name:'Stettler, AB',lat:52.323,lng:-112.723},{name:'Drumheller, AB',lat:51.463,lng:-112.709},
  {name:'Fort McMurray, AB',lat:56.726,lng:-111.379},{name:'Banff, AB',lat:51.178,lng:-115.571},
];

const ROLES=['Client PM','Site Super','Owner Rep','Estimator','Other'];
const STATUSES=['Not Started','In Progress','On Hold','Overdue','Completed'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

const ALL_COLS=[
  {key:'alerts',label:'Alerts',locked:true,visible:true},
  {key:'project',label:'Project',locked:true,visible:true},
  {key:'status',label:'Status',locked:false,visible:true},
  {key:'ourPM',label:'Our PM',locked:false,visible:true},
  {key:'contacts',label:'Client contacts',locked:false,visible:true},
  {key:'value',label:'Value',locked:false,visible:true},
  {key:'margin',label:'Margin',locked:false,visible:true},
  {key:'installStart',label:'Install start',locked:false,visible:true},
  {key:'installer',label:'Installer',locked:false,visible:true},
  {key:'changeOrders',label:'Change orders',locked:false,visible:false},
  {key:'schedulePro',label:'Schedule Pro',locked:false,visible:false},
  {key:'warrantyStatus',label:'Warranty',locked:false,visible:false},
];

let projects=[], contactsList=[], installersList=[], listData={};
let editId=null, colPickerOpen=false;
let modalContacts=[], showAddContact=false, showAddInstaller=false;
let locInput='', locSuggestions=[], pinState={active:false,lat:null,lng:null};
let gateErrors=[];
let reportMonth=new Date().getMonth(), reportYear=new Date().getFullYear();
let saving=false;

function today(){return new Date().toISOString().split('T')[0]}
function daysDiff(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function fmt$(n){return '$'+Math.round(n||0).toLocaleString()}
function fmtP(n){return n!=null&&n!==''?(parseFloat(n)*100).toFixed(1)+'%':'—'}
function locToX(lng){return Math.min(93,Math.max(7,((lng-(-120))/((-110)-(-120)))*100))}
function locToY(lat){return Math.min(93,Math.max(7,(((57)-(lat))/((57)-(49)))*100))}

async function api(params){
  const url=new URL(SCRIPT_URL);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const res=await fetch(url.toString());
  return res.json();
}

async function loadData(){
  try{
    const data=await api({action:'getAll'});
    projects=data.projects||[];
    contactsList=(data.contacts||[]).map(c=>({name:c.Name,company:c.Company,role:c.Role}));
    installersList=(data.installers||[]).map(i=>i.Name).filter(Boolean);
    listData=data.lists||{};
    populatePMFilter();
    renderMetrics();
    renderTable();
  }catch(e){
    document.getElementById('tbody').innerHTML=`<tr><td colspan="10" class="empty">Could not connect to Google Sheets. Check your script URL and permissions.</td></tr>`;
  }
}

function getAlerts(p){
  const a={design:'na',materials:'na',eta:'na',startup:'na'};
  if(p['Job Status']==='Completed') return a;
  const t=today(), dts=p['Install Start']?daysDiff(t,p['Install Start']):999;
  if(p['Design Required']==='true'||p['Design Required']===true){
    a.design=p['Design Status']==='Completed'?'ok':dts<14?'crit':'warn';
  }
  const mo=p['Materials Ordered'];
  a.materials=mo==='Delivered'?'ok':mo==='Ordered'?(dts<7?'warn':'ok'):(dts<21?'crit':dts<42?'warn':'ok');
  if(p['Critical ETA']){const de=daysDiff(t,p['Critical ETA']);a.eta=de<0?(mo==='Delivered'?'ok':'crit'):de<7?'warn':'ok';}
  const val=parseFloat(p['Value'])||0;
  if(val>=50000){
    if(!p['Startup Meeting'])a.startup=dts<7?'crit':dts<14?'warn':'ok';
    else a.startup=daysDiff(p['Startup Meeting'],p['Install Start']||p['Startup Meeting'])>=7?'ok':'warn';
  }
  return a;
}
function hasAlert(p){return Object.values(getAlerts(p)).some(v=>v==='warn'||v==='crit')}

function statusBadge(s){
  const m={'Not Started':'b-notstart','In Progress':'b-prog','On Hold':'b-hold','Overdue':'b-overdue','Completed':'b-complete'};
  return `<span class="badge ${m[s]||'b-notstart'}">${s||'—'}</span>`;
}

function getContactsForProject(p){
  try{return JSON.parse(p['Contacts']||'[]')}catch{return []}
}

function renderMetrics(){
  const active=projects.filter(p=>p['Job Status']!=='Completed');
  const tq=active.reduce((s,p)=>s+(parseFloat(p['Value'])||0),0);
  const ac=projects.filter(p=>p['Job Status']!=='Completed'&&hasAlert(p)).length;
  const ml=projects.filter(p=>p['Ending Margin']!=null&&p['Ending Margin']!==''&&p['Starting Margin']!=null&&p['Starting Margin']!=='');
  const av=ml.length?ml.reduce((s,p)=>s+(parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin'])),0)/ml.length:0;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Active projects</div><div class="metric-value">${active.length}</div><div class="metric-sub">${projects.length} total</div></div>
    <div class="metric"><div class="metric-label">Pipeline value</div><div class="metric-value">${fmt$(tq)}</div><div class="metric-sub">active jobs</div></div>
    <div class="metric"><div class="metric-label">Alerts</div><div class="metric-value" style="color:${ac>0?'#e02020':'#22a06b'}">${ac}</div><div class="metric-sub">need attention</div></div>
    <div class="metric"><div class="metric-label">Avg margin variance</div><div class="metric-value" style="color:${av<0?'#e02020':'#22a06b'}">${av>=0?'+':''}${(av*100).toFixed(1)}%</div><div class="metric-sub">closed jobs</div></div>`;
}

function toggleColPicker(){

function toggleCol(key,val){const c=ALL_COLS.find(x=>x.key===key);if(c&&!c.locked){c.visible=val;renderTable();}}

function renderTable(){
  renderMetrics();
  const sf=document.getElementById('filter-status').value;
  const pf=document.getElementById('filter-pm').value;
  const af=document.getElementById('filter-alert').value;
  const q=(document.getElementById('filter-search').value||'').toLowerCase();
  const vis=ALL_COLS.filter(c=>c.visible);
  document.getElementById('thead-row').innerHTML=vis.map(c=>`<th>${c.label}</th>`).join('')+'<th></th>';
  let data=projects.filter(p=>{
    if(sf&&p['Job Status']!==sf)return false;
    if(pf&&p['Our PM']!==pf)return false;
    if(af==='alerts'&&!hasAlert(p))return false;
    if(q&&!(p['Project Name']||'').toLowerCase().includes(q)&&!(p['Client']||'').toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>{
    if(a['Job Status']==='Completed'&&b['Job Status']!=='Completed')return 1;
    if(b['Job Status']==='Completed'&&a['Job Status']!=='Completed')return -1;
    return(hasAlert(b)?1:0)-(hasAlert(a)?1:0);
  });
  const tbody=document.getElementById('tbody');
  if(!data.length){tbody.innerHTML=`<tr><td colspan="${vis.length+1}" class="empty">No projects match your filters.</td></tr>`;return;}
  tbody.innerHTML=data.map(p=>{
    const al=getAlerts(p);
    const isC=p['Job Status']==='Completed';
    const sm=parseFloat(p['Starting Margin']),em=parseFloat(p['Ending Margin']);
    const mv=!isNaN(sm)&&!isNaN(em)?em-sm:null;
    const pContacts=getContactsForProject(p);
    const pills=['Design','Materials','ETA','Start-up'].map((l,i)=>{
      const v=Object.values(al)[i];
      return v==='crit'?`<span class="alert-pill ap-crit">${l}</span>`:v==='warn'?`<span class="alert-pill ap-warn">${l}</span>`:'';
    }).join('');
    const cellMap={
      alerts:`<div class="alert-cell"><span title="Design" class="alert-dot a-${al.design}"></span><span title="Materials" class="alert-dot a-${al.materials}"></span><span title="ETA" class="alert-dot a-${al.eta}"></span><span title="Start-up" class="alert-dot a-${al.startup}"></span></div>`,
      project:`<div class="pname" style="font-weight:600">${p['Project Name']||'—'}</div><div style="font-size:11px;color:#888">${p['Client']||''}${pills}</div>`,
      status:statusBadge(p['Job Status']),
      ourPM:`<span style="font-size:12px">${p['Our PM']||'—'}</span>`,
      contacts:pContacts.length?pContacts.map(c=>`<div style="font-size:12px">${c.name}<span style="font-size:10px;color:#aaa;margin-left:4px">${c.role}</span></div>`).join(''):`<span style="color:#ccc;font-size:12px">—</span>`,
      value:`<span style="font-weight:600">${fmt$(p['Value'])}</span>`,
      margin:`<div style="font-size:12px">${fmtP(p['Starting Margin'])} → ${p['Ending Margin']!=null&&p['Ending Margin']!==''?fmtP(p['Ending Margin']):'?'}</div>${mv!=null?`<div class="${mv<-0.05?'val-lo':mv>=0?'val-hi':'val-lo'}" style="font-size:11px">${mv>=0?'+':''}${(mv*100).toFixed(1)}%</div>`:''}`,
      installStart:`<span style="font-size:12px;white-space:nowrap">${p['Install Start']||'—'}</span>`,
      installer:`<span style="font-size:12px">${p['Installer']||'—'}</span>`,
      changeOrders:`<span style="font-size:12px">${p['Change Orders']||0}</span>`,
      schedulePro:`<span style="font-size:12px">${p['Schedule Pro']==='true'||p['Schedule Pro']===true?'✓':'—'}</span>`,
      warrantyStatus:`<span style="font-size:12px">${p['Warranty Status']||'—'}</span>`,
    };
    return `<tr class="${isC?'completed':''}" onclick="openModal('${p['ID']}')">
      ${vis.map(c=>`<td>${cellMap[c.key]||''}</td>`).join('')}
      <td onclick="event.stopPropagation()"><button class="row-act" onclick="openModal('${p['ID']}')">⋯</button></td>
    </tr>`;
  }).join('');
}

function openModal(id){

function onStatusChange(val){
  if(val==='Completed'){
    ['label-endM','label-completed','label-startup','label-warr','label-warrDate'].forEach(id=>{
      const el=document.getElementById(id);
      if(el&&!el.querySelector('.req'))el.innerHTML+=`<span class="req"> *</span>`;
    });
  }
}

function validateCloseOut(data){
  const errors=[];
  if(data['Ending Margin']===''||data['Ending Margin']==null) errors.push('Ending margin % is required');
  if(!data['Completed Date']) errors.push('Completed date is required');
  if(!data['Installer']) errors.push('Installer must be assigned');
  if((parseFloat(data['Value'])||0)>=50000&&!data['Startup Meeting']) errors.push('Start-up meeting date required (job over $50K)');
  if(data['Warranty Status']!=='Completed') errors.push('Warranty package must be marked Completed');
  if(!data['Warranty Date']) errors.push('Warranty delivered date is required');
  return errors;
}

function addContactRow(){modalContacts.push({name:'',role:'Site Super'});renderModal();}
function removeContact(i){if(modalContacts.length>1)modalContacts.splice(i,1);else modalContacts[0]={name:'',role:''};renderModal();}
function updateContact(i,f,val){modalContacts[i][f]=val;}
function startNewContact(){showAddContact=true;renderModal();setTimeout(()=>document.getElementById('new-contact-inp')?.focus(),10);}
function cancelNewContact(){showAddContact=false;renderModal();}
function confirmNewContact(){
  const val=document.getElementById('new-contact-inp')?.value?.trim();
  if(!val)return;
  const last=modalContacts[modalContacts.length-1];
  if(!last.name)last.name=val;else modalContacts.push({name:val,role:'Site Super'});
  showAddContact=false;
  api({action:'addContact',data:JSON.stringify({Name:val,Company:'',Role:''})}).then(()=>{
    contactsList.push({name:val,company:'',role:''});
  });
  renderModal();
}
function startNewInstaller(){showAddInstaller=true;renderModal();setTimeout(()=>document.getElementById('new-inst-inp')?.focus(),10);}
function cancelNewInstaller(){showAddInstaller=false;renderModal();}
function confirmNewInstaller(){
  const val=document.getElementById('new-inst-inp')?.value?.trim();
  if(!val)return;
  if(!installersList.includes(val)){
    installersList.push(val);
    api({action:'addInstaller',name:val});
  }
  showAddInstaller=false;renderModal();
  setTimeout(()=>{const s=document.getElementById('f-installer');if(s)s.value=val;},20);
}
function handleLocInput(val){
  locInput=val;
  locSuggestions=val.length>=2?AB_CITIES.filter(c=>c.name.toLowerCase().includes(val.toLowerCase())).slice(0,5):[];
  renderModal();
  setTimeout(()=>{const el=document.getElementById('f-location');if(el){el.focus();el.setSelectionRange(val.length,val.length);}},10);
}
function selectLoc(i){const s=locSuggestions[i];locInput=s.name;pinState={active:false,lat:s.lat,lng:s.lng};locSuggestions=[];renderModal();}
function startManualPin(){pinState.active=true;locSuggestions=[];renderModal();}
function handleMapClick(e){
  if(!pinState.active)return;
  const r=document.getElementById('map-area').getBoundingClientRect();
  const xp=(e.clientX-r.left)/r.width,yp=(e.clientY-r.top)/r.height;
  pinState={active:false,lat:parseFloat((57-yp*(57-49)).toFixed(3)),lng:parseFloat((-120+xp*((-110)-(-120))).toFixed(3))};
  if(!locInput)locInput='Custom location';
  renderModal();
}
function closeModal(){document.getElementById('modal-root').innerHTML='';gateErrors=[];}

async function saveProject(){
  const g=id=>document.getElementById(id)?.value||'';
  const gn=id=>{const v=parseFloat(document.getElementById(id)?.value);return isNaN(v)?'':v;};
  const gb=id=>document.getElementById(id)?.value==='true';

  const p=editId?projects.find(x=>x['ID']==editId):null;
  const data={
    'ID':p?p['ID']:'',
    'Project Name':g('f-name'),
    'Client':g('f-client'),
    'Our PM':g('f-ourPM'),
    'Contacts':JSON.stringify(modalContacts.filter(c=>c.name)),
    'Location':locInput,
    'Province':g('f-province'),
    'Latitude':pinState.lat||'',
    'Longitude':pinState.lng||'',
    'Value':gn('f-value'),
    'Job Status':g('f-status'),
    'Starting Margin':gn('f-startM')!==''?gn('f-startM')/100:'',
    'Ending Margin':gn('f-endM')!==''?gn('f-endM')/100:'',
    'Change Orders':parseInt(g('f-co'))||0,
    'Install Start':g('f-start'),
    'Installer':g('f-installer'),
    'Schedule Pro':gb('f-schedpro'),
    'Completed Date':g('f-completed'),
    'Design Required':gb('f-designReq'),
    'Design Date':g('f-designDate'),
    'Design Status':g('f-designStatus'),
    'Materials Ordered':g('f-mats'),
    'Critical ETA':g('f-eta'),
    'ETA Notes':g('f-etaNotes'),
    'Startup Meeting':g('f-startup'),
    'Warranty Status':g('f-warr'),
    'Warranty Date':g('f-warrDate'),
    'Comments':g('f-comments'),
  };

  if(data['Job Status']==='Completed'){
    gateErrors=validateCloseOut(data);
    if(gateErrors.length){renderModal();return;}
  }

  const btn=document.getElementById('btn-save');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}

  try{
    const result=await api({action:'saveProject',data:JSON.stringify(data)});
    if(result.error)throw new Error(result.error);
    showToast('Project saved');
    closeModal();
    await loadData();
  }catch(e){
    showToast('Save failed — check connection','error');
    if(btn){btn.disabled=false;btn.textContent='Save project';}
  }
}

async function deleteProject(id){
  if(!confirm('Remove this project from the tracker?'))return;
  try{
    await api({action:'deleteProject',id});
    showToast('Project deleted');
    closeModal();
    await loadData();
  }catch(e){showToast('Delete failed','error');}
}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='error'?'#cc2222':'#1a1a1a';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function switchView(view,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  btn.classList.add('active');
  if(view==='report')renderReport();
}

function renderReport(){
  const el=document.getElementById('report-content');
  const mName=MONTHS[reportMonth];
  const closed=projects.filter(p=>{
    if(!p['Completed Date'])return false;
    const d=new Date(p['Completed Date']);
    return d.getMonth()===reportMonth&&d.getFullYear()===reportYear;
  });
  const allClosed=projects.filter(p=>p['Completed Date']);
  const suEligible=allClosed.filter(p=>(parseFloat(p['Value'])||0)>=50000);
  const suHit=suEligible.filter(p=>{
    if(!p['Startup Meeting']||!p['Install Start'])return false;
    return daysDiff(p['Startup Meeting'],p['Install Start'])>=7;
  });
  const suRate=suEligible.length?Math.round(suHit.length/suEligible.length*100):100;
  const marginJobs=allClosed.filter(p=>p['Ending Margin']!=null&&p['Ending Margin']!==''&&p['Starting Margin']!=null&&p['Starting Margin']!=='');
  const marginPass=marginJobs.filter(p=>(parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin']))>=-0.05);
  const marginRate=marginJobs.length?Math.round(marginPass.length/marginJobs.length*100):100;
  const totalValue=closed.reduce((s,p)=>s+(parseFloat(p['Value'])||0),0);
  const avgMV=marginJobs.length?marginJobs.reduce((s,p)=>s+(parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin'])),0)/marginJobs.length:0;
  const monthOpts=MONTHS.map((m,i)=>`<option value="${i}" ${i===reportMonth?'selected':''}>${m}</option>`).join('');
  const yearOpts=[2024,2025,2026,2027].map(y=>`<option ${y===reportYear?'selected':''}>${y}</option>`).join('');

  el.innerHTML=`
  <div class="report-header">
    <div>
      <h2>${mName} ${reportYear} — Operations Report</h2>
      <div style="font-size:12px;color:#888;margin-top:3px">Red Deer Carpet One Floor & Home</div>
    </div>
    <div class="report-controls">
      <select onchange="reportMonth=parseInt(this.value);renderReport()" style="font-size:13px;padding:5px 8px;border-radius:8px;border:1px solid #ddd;background:#fff;font-family:inherit">${monthOpts}</select>
      <select onchange="reportYear=parseInt(this.value);renderReport()" style="font-size:13px;padding:5px 8px;border-radius:8px;border:1px solid #ddd;background:#fff;font-family:inherit">${yearOpts}</select>
    </div>
  </div>

  <div class="report-section">
    <div class="report-section-head"><h3>Month summary — ${mName} ${reportYear}</h3></div>
    <div class="report-section-body">
      <div class="report-stat-grid">
        <div class="report-stat"><div class="report-stat-value">${closed.length}</div><div class="report-stat-label">Jobs closed</div></div>
        <div class="report-stat"><div class="report-stat-value">${fmt$(totalValue)}</div><div class="report-stat-label">Revenue closed</div></div>
        <div class="report-stat"><div class="report-stat-value" style="color:${avgMV<0?'#e02020':'#22a06b'}">${avgMV>=0?'+':''}${(avgMV*100).toFixed(1)}%</div><div class="report-stat-label">Avg margin variance (all-time)</div></div>
      </div>
      ${closed.length===0?`<div style="text-align:center;padding:16px;font-size:13px;color:#aaa">No jobs closed in ${mName} ${reportYear}. Try a different month.</div>`:''}
    </div>
  </div>

  <div class="report-section">
    <div class="report-section-head">
      <h3>Benchmark 1 — Start-up meeting compliance</h3>
      <span class="chip ${suRate===100?'chip-ok':suRate>=80?'chip-warn':'chip-miss'}">${suRate}% compliant</span>
    </div>
    <div class="report-section-body">
      <div style="margin-bottom:10px;font-size:12px;color:#888">Goal: start-up meeting booked at least 7 days before install start, on all jobs over $50,000</div>
      <div class="progress-bar-wrap"><div class="progress-bar ${suRate<80?'bad':suRate<100?'warn':''}" style="width:${suRate}%"></div></div>
      <div style="margin-top:4px;font-size:11px;color:#aaa">${suHit.length} of ${suEligible.length} eligible closed jobs met the benchmark</div>
      ${suEligible.length?`<table class="report-table" style="margin-top:16px">
        <thead><tr><th>Project</th><th>Our PM</th><th>Value</th><th>Meeting date</th><th>Install start</th><th>Lead days</th><th>Result</th></tr></thead>
        <tbody>${suEligible.map(p=>{
          const lead=p['Startup Meeting']&&p['Install Start']?daysDiff(p['Startup Meeting'],p['Install Start']):null;
          const hit=lead!=null&&lead>=7;
          return`<tr><td style="font-weight:500">${p['Project Name']}</td><td>${p['Our PM']}</td><td>${fmt$(p['Value'])}</td><td>${p['Startup Meeting']||'—'}</td><td>${p['Install Start']||'—'}</td><td>${lead!=null?lead+' days':'—'}</td><td><span class="chip ${hit?'chip-ok':'chip-miss'}">${hit?'Met':'Missed'}</span></td></tr>`;
        }).join('')}</tbody></table>`:''}
    </div>
  </div>

  <div class="report-section">
    <div class="report-section-head">
      <h3>Benchmark 2 — Margin protection</h3>
      <span class="chip ${marginRate===100?'chip-ok':marginRate>=80?'chip-warn':'chip-miss'}">${marginRate}% compliant</span>
    </div>
    <div class="report-section-body">
      <div style="margin-bottom:10px;font-size:12px;color:#888">Goal: margin loss no greater than 5% on any closed job</div>
      <div class="progress-bar-wrap"><div class="progress-bar ${marginRate<80?'bad':marginRate<100?'warn':''}" style="width:${marginRate}%"></div></div>
      <div style="margin-top:4px;font-size:11px;color:#aaa">${marginPass.length} of ${marginJobs.length} closed jobs with margin data met the benchmark</div>
      ${marginJobs.length?`<table class="report-table" style="margin-top:16px">
        <thead><tr><th>Project</th><th>Our PM</th><th>Start margin</th><th>End margin</th><th>Variance</th><th>Change orders</th><th>Result</th></tr></thead>
        <tbody>${marginJobs.map(p=>{
          const mv=parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin']);const hit=mv>=-0.05;
          return`<tr><td style="font-weight:500">${p['Project Name']}</td><td>${p['Our PM']}</td><td>${fmtP(p['Starting Margin'])}</td><td>${fmtP(p['Ending Margin'])}</td><td class="${mv<0?'val-lo':'val-hi'}">${mv>=0?'+':''}${(mv*100).toFixed(1)}%</td><td>${p['Change Orders']||0}</td><td><span class="chip ${hit?'chip-ok':'chip-miss'}">${hit?'Met':'Missed'}</span></td></tr>`;
        }).join('')}</tbody></table>`:''}
    </div>
  </div>

  <div class="report-section">
    <div class="report-section-head"><h3>Auto-email preview — sends on 1st of each month</h3></div>
    <div class="report-section-body">
      <div class="email-preview">
        <div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #e5e5e3">
          <strong>To:</strong> CEO Admin &nbsp;·&nbsp; <strong>Subject:</strong> RDCO Operations Report — ${mName} ${reportYear}
        </div>
        Hi,<br><br>
        Here is the automated operations report for <strong>${mName} ${reportYear}</strong>.<br><br>
        <strong>Jobs closed this month:</strong> ${closed.length} &nbsp;·&nbsp; <strong>Revenue:</strong> ${fmt$(totalValue)}<br>
        <strong>Benchmark 1 — Start-up meeting:</strong> ${suRate}% compliant (${suHit.length} / ${suEligible.length} eligible jobs)<br>
        <strong>Benchmark 2 — Margin protection:</strong> ${marginRate}% compliant (${marginPass.length} / ${marginJobs.length} jobs)<br><br>
        ${marginJobs.filter(p=>(parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin']))<-0.05).length?
          `<strong>Margin benchmark misses:</strong><br>${marginJobs.filter(p=>(parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin']))<-0.05).map(p=>`&nbsp;&nbsp;• ${p['Project Name']} — ${((parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin']))*100).toFixed(1)}% variance`).join('<br>')}<br><br>`:''}
        Full detail is available in the Project Operations Tracker.<br><br>
        — Automated report, RDCO Project Operations
      </div>
    </div>
  </div>`;
}

document.addEventListener('click',e=>{
  if(colPickerOpen&&!document.getElementById('col-picker')?.contains(e.target)){
    colPickerOpen=false;
    const dd=document.getElementById('col-dropdown');if(dd)dd.style.display='none';
    const btn=document.getElementById('col-btn');if(btn)btn.classList.remove('active');
  }
});

loadData();
</script>
</body>
</html>
