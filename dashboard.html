<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDCO Operations Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#009BA5;--teal-dark:#007A82;--teal-light:#E8F7F8;--teal-mid:#B3E4E7;
  --bg:#F2F2F7;--surface:#FFFFFF;--surface2:#F2F2F7;
  --text-primary:#1C1C1E;--text-secondary:#636366;--text-tertiary:#AEAEB2;
  --border:#E5E5EA;
  --green:#34C759;--orange:#FF9500;--red:#FF3B30;--blue:#007AFF;
  --radius:14px;--radius-sm:9px;
}
html,body{height:100%;background:var(--bg)}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;color:var(--text-primary);-webkit-font-smoothing:antialiased}

/* Layout */
.dash{padding:14px 18px;display:flex;flex-direction:column;gap:12px;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:var(--teal);border-radius:var(--radius)}
.tb-logo{height:28px;filter:brightness(0) invert(1);display:block}
.tb-logo-fallback{color:white;font-size:15px;font-weight:600;letter-spacing:0.01em;display:none}
.tb-right{display:flex;align-items:center;gap:14px}
.tb-date{font-size:12px;color:rgba(255,255,255,0.75);font-weight:400}
.tb-refresh{font-size:11px;color:rgba(255,255,255,0.5)}
.tb-nav{display:flex;gap:4px}
.tb-nav-btn{padding:5px 12px;font-size:12px;font-weight:500;border-radius:20px;border:none;cursor:pointer;font-family:inherit;transition:background 0.15s}
.tb-nav-btn.active{background:rgba(255,255,255,0.25);color:white}
.tb-nav-btn:not(.active){background:transparent;color:rgba(255,255,255,0.6)}
.tb-nav-btn:hover:not(.active){background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.9)}
.owner-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;cursor:pointer;padding:0;flex-shrink:0;transition:background 0.2s}
.owner-dot:hover{background:rgba(255,255,255,0.45)}
.owner-dot.active{background:rgba(255,255,255,0.9)}

/* Views */
.view{display:none}.view.active{display:flex;flex-direction:column;gap:12px}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
.metric{background:var(--surface);border-radius:var(--radius);padding:13px 15px}
.metric-label{font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.metric-value{font-size:24px;font-weight:300;letter-spacing:-0.02em;line-height:1}
.metric-sub{font-size:11px;color:var(--text-tertiary);margin-top:3px}

/* Cards */
.card{background:var(--surface);border-radius:var(--radius);padding:15px 17px}
.card-title{font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}

/* Main grid */
.main-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:12px}
.side-col{display:flex;flex-direction:column;gap:12px}

/* PM Pipeline */
.pm-list{display:flex;flex-direction:column;gap:7px}
.pm-row{padding:9px 11px;border-radius:var(--radius-sm);background:var(--surface2);display:grid;grid-template-columns:95px 1fr auto;gap:10px;align-items:center}
.pm-name{font-size:13px;font-weight:500}
.pm-count{font-size:10px;color:var(--text-tertiary);margin-top:1px}
.pm-bar-wrap{display:flex;gap:2px;height:20px;border-radius:6px;overflow:hidden}
.pm-seg{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:rgba(255,255,255,0.95);min-width:0;overflow:hidden;padding:0 3px}
.pm-breakdown{font-size:9px;color:var(--text-tertiary);margin-top:3px}
.pm-margin{font-size:12px;font-weight:500;min-width:44px;text-align:right}

/* Alerts */
.alerts-wrap{display:flex;flex-direction:column}
.alert-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.alert-row:last-child{border-bottom:none}
.alert-ind{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ai-c{background:var(--red)}.ai-w{background:var(--orange)}
.alert-name{font-size:12px;font-weight:500;line-height:1.3}
.alert-meta{font-size:10px;color:var(--text-tertiary);margin-top:1px}
.alert-pills{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.ap{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600}
.ap-c{background:#FFF0F0;color:#C0392B}
.ap-w{background:#FFF8F0;color:#C0630A}
.no-alert{font-size:12px;color:var(--text-tertiary);padding:14px 0;text-align:center}

/* Benchmarks */
.bench-list{display:flex;flex-direction:column;gap:11px}
.bench-item{display:flex;flex-direction:column;gap:4px}
.bench-top{display:flex;justify-content:space-between;align-items:baseline}
.bench-lbl{font-size:11px;color:var(--text-secondary)}
.bench-pct{font-size:15px;font-weight:300;letter-spacing:-0.02em}
.bench-track{background:var(--surface2);border-radius:20px;height:5px;overflow:hidden}
.bench-fill{height:100%;border-radius:20px;transition:width 0.5s ease}
.bench-detail{font-size:10px;color:var(--text-tertiary)}

/* Bottom grid */
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Map */
.map-wrap{position:relative;width:100%;height:180px;background:var(--teal-light);border-radius:var(--radius-sm);overflow:hidden}
.map-grid-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(0,155,165,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(0,155,165,0.08) 1px,transparent 1px);background-size:28px 28px}
.map-region{position:absolute;font-size:8px;color:var(--teal-dark);font-weight:500;letter-spacing:0.04em;text-transform:uppercase;pointer-events:none;opacity:0.55}
.pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer}
.pin-dot{width:10px;height:10px;border-radius:50%;border:2px solid white}
.pin-tip{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:var(--surface);border-radius:var(--radius-sm);padding:6px 10px;font-size:10px;white-space:nowrap;z-index:10;pointer-events:none;display:none;min-width:130px;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
.pin:hover .pin-tip{display:block}
.map-legend{display:flex;gap:12px;margin-top:7px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-tertiary)}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Pipeline summary */
.pipe-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.pipe-row:last-child{border-bottom:none}
.pipe-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pipe-label{font-size:12px;color:var(--text-secondary);margin-left:8px}
.pipe-jobs{font-size:11px;color:var(--text-tertiary)}
.pipe-val{font-size:13px;font-weight:500;min-width:55px;text-align:right}
.pipe-total{display:flex;justify-content:space-between;padding:8px 0 2px;margin-top:2px}
.pipe-total-lbl{font-size:12px;font-weight:500}
.pipe-total-val{font-size:14px;font-weight:600;color:var(--teal)}

/* Owner panel */
.owner-panel{background:var(--teal-light);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--teal-mid)}
.owner-panel-title{font-size:10px;font-weight:600;color:var(--teal-dark);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}

/* Owner PM view */
.pm-detail-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.pm-detail-card{background:var(--surface);border-radius:var(--radius);padding:14px}
.pm-detail-head{display:flex;align-items:center;gap:9px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.pm-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.pm-detail-name{font-size:13px;font-weight:500}
.pm-detail-sub{font-size:10px;color:var(--text-tertiary);margin-top:1px}
.sig-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.sig-row:last-child{border-bottom:none}
.sig-lbl{font-size:11px;color:var(--text-secondary)}
.sig-sub{font-size:9px;color:var(--text-tertiary);margin-top:1px}
.sig-val-wrap{display:flex;align-items:center;gap:5px}
.sig-val{font-size:11px;font-weight:500;text-align:right}
.sig-sub-val{font-size:9px;color:var(--text-tertiary);text-align:right;margin-top:1px}
.sig-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sd-g{background:var(--green)}.sd-a{background:var(--orange)}.sd-r{background:var(--red)}.sd-n{background:var(--text-tertiary)}
.client-section{background:var(--surface);border-radius:var(--radius);padding:14px 16px}
.client-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.client-col-title{font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.client-row{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.client-row:last-child{border-bottom:none}
.client-name{font-size:11px;font-weight:500}
.client-co{font-size:9px;color:var(--text-tertiary)}
.client-stat{text-align:right}
.client-stat-val{font-size:11px;font-weight:500}
.client-stat-lbl{font-size:9px;color:var(--text-tertiary)}
.flag{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:600;white-space:nowrap}
.f-r{background:#FFF0F0;color:#C0392B}.f-a{background:#FFF8F0;color:#C0630A}.f-g{background:#F0FFF5;color:#1A7A3A}.f-n{background:var(--surface2);color:var(--text-tertiary)}
.missing-list{display:flex;flex-direction:column;gap:3px}
.missing-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:var(--surface2);border-radius:var(--radius-sm);font-size:10px}
.missing-name{color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px}
.missing-pm{font-size:9px;color:var(--text-tertiary)}
.mf-pills{display:flex;gap:2px;flex-wrap:wrap}
.mf{font-size:9px;padding:1px 5px;border-radius:20px;background:#FFF8F0;color:#C0630A;font-weight:600}
.no-data{font-size:11px;color:var(--text-tertiary);padding:10px 0;text-align:center}

/* Password overlay */
.pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px)}
.pw-box{background:var(--surface);border-radius:18px;padding:28px 24px;width:290px;display:flex;flex-direction:column;gap:12px;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.pw-title{font-size:16px;font-weight:500;text-align:center}
.pw-sub{font-size:13px;color:var(--text-secondary);text-align:center;line-height:1.5}
.pw-input{font-size:15px;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text-primary);font-family:inherit;width:100%;text-align:center;letter-spacing:0.2em}
.pw-input:focus{outline:none;border-color:var(--teal)}
.pw-error{font-size:12px;color:var(--red);text-align:center;min-height:15px}
.pw-btns{display:flex;gap:8px}
.pw-cancel{flex:1;padding:10px;font-size:13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;font-family:inherit}
.pw-confirm{flex:1;padding:10px;font-size:13px;font-weight:500;border-radius:var(--radius-sm);border:none;background:var(--teal);color:white;cursor:pointer;font-family:inherit}
.pw-confirm:hover{background:var(--teal-dark)}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:14px;color:var(--text-tertiary);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--text-primary);color:white;padding:10px 16px;border-radius:10px;font-size:12px;z-index:300;opacity:0;transition:opacity 0.2s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="dash">
  <div class="topbar">
    <img class="tb-logo" id="tb-logo" src="Horizontal_White_on_Teal_RD.png" alt="Red Deer Carpet One" onerror="this.style.display='none';document.getElementById('tb-logo-fb').style.display='block'">
    <span class="tb-logo-fallback" id="tb-logo-fb">Red Deer Carpet One Floor & Home</span>
    <div class="tb-right">
      <div class="tb-nav">
        <button class="tb-nav-btn active" id="btn-tv" onclick="switchView('tv',this)">Operations</button>
        <button class="tb-nav-btn" id="btn-owner" onclick="switchView('owner',this)" style="display:none">Owner view</button>
      </div>
      <span class="tb-refresh" id="refresh-label"></span>
      <span class="tb-date" id="dash-date"></span>
      <button class="owner-dot" id="owner-dot" onclick="toggleOwner()" title=""></button>
    </div>
  </div>

  <div id="main-content">
    <div class="loading"><div class="spinner"></div>Loading live data…</div>
  </div>
</div>

<div id="pw-root"></div>
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyLnBcgtkwdozdALNy8URu6WAp09vsoTRUxFyS82AWsXNIOvIv0sM27-iLuifxVHtzB2g/exec';
const OWNER_PASSWORD='changeme';

const PMS=['Matt Balson','Mallory Dubois','Doug Hingley','Mark Stetson'];
const PM_COLORS=[{bg:'#E8F4FF',text:'#0055B3'},{bg:'#E8F9F0',text:'#1A7A3A'},{bg:'#F0EEFF',text:'#4A35B0'},{bg:'#FFF3E8',text:'#B35A00'}];
const SC={'Not Started':'#007AFF','In Progress':'#34C759','On Hold':'#FF9500','Overdue':'#FF3B30'};
const STATUSES=['Not Started','In Progress','On Hold','Overdue'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

let projects=[], ownerMode=false, currentView='tv', countdown=300, timer=null;

function fmt$(n,s){if(s){if(n>=1000000)return'$'+(n/1000000).toFixed(1)+'M';if(n>=1000)return'$'+Math.round(n/1000)+'K';}return'$'+Math.round(n||0).toLocaleString();}
function fmtP(n){const f=parseFloat(n);return isNaN(f)?'—':(f*100).toFixed(1)+'%'}
function locToX(lng){return Math.min(92,Math.max(5,((lng-(-118))/((-110)-(-118)))*100))}
function locToY(lat){return Math.min(88,Math.max(5,(((56)-(lat))/((56)-(49)))*100))}
function bc(r){return r===100?'#34C759':r>=80?'#FF9500':'#FF3B30'}
function dot(c){return`<span class="sig-dot sd-${c}"></span>`}
function daysUntil(d){return Math.round((new Date(d)-new Date())/86400000)}
function initials(n){return n.split(' ').map(w=>w[0]).join('')}
function pinColor(p){
  let alerts={};
  try{alerts=JSON.parse(p['Alerts']||'{}')}catch{}
  const v=Object.values(alerts);
  if(v.some(x=>x==='crit'))return'#FF3B30';
  if(v.some(x=>x==='warn'))return'#FF9500';
  if(p['Job Status']==='In Progress')return'#34C759';
  return'#007AFF';
}

function computeAlerts(p){
  const a={design:'na',materials:'na',eta:'na',startup:'na'};
  if(p['Job Status']==='Completed')return a;
  const t=new Date().toISOString().split('T')[0];
  const dts=p['Install Start']?Math.round((new Date(p['Install Start'])-new Date(t))/86400000):999;
  if(p['Design Required']==='true'||p['Design Required']===true)
    a.design=p['Design Status']==='Completed'?'ok':dts<14?'crit':'warn';
  const mo=p['Materials Ordered'];
  a.materials=mo==='Delivered'?'ok':mo==='Ordered'?(dts<7?'warn':'ok'):(dts<21?'crit':dts<42?'warn':'ok');
  if(p['Critical ETA']){const de=Math.round((new Date(p['Critical ETA'])-new Date(t))/86400000);a.eta=de<0?(mo==='Delivered'?'ok':'crit'):de<7?'warn':'ok';}
  const val=parseFloat(p['Value'])||0;
  if(val>=50000){if(!p['Startup Meeting'])a.startup=dts<7?'crit':dts<14?'warn':'ok';else a.startup=Math.round((new Date(p['Install Start']||p['Startup Meeting'])-new Date(p['Startup Meeting']))/86400000)>=7?'ok':'warn';}
  return a;
}

function hasAlert(p){return Object.values(computeAlerts(p)).some(v=>v==='crit'||v==='warn')}

function getContacts(p){
  try{return JSON.parse(p['Contacts']||'[]')}catch{return[]}
}

async function loadData(){
  try{
    const url=new URL(SCRIPT_URL);
    url.searchParams.set('action','getAll');
    const res=await fetch(url.toString());
    const data=await res.json();
    projects=data.projects||[];
    render();
  }catch(e){
    document.getElementById('main-content').innerHTML=`<div class="loading"><div style="color:#FF3B30;font-size:13px">Could not connect to Google Sheets. Check your script URL and permissions.</div></div>`;
  }
}

function switchView(view, btn){
  currentView=view;
  document.querySelectorAll('.tb-nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  document.getElementById('dash-date').textContent=new Date().toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric',year:'numeric'})+' · '+new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
  if(currentView==='tv')renderTV();
  else renderOwner();
}

function renderTV(){
  const active=projects.filter(p=>p['Job Status']!=='Completed');
  const closed=projects.filter(p=>p['Job Status']==='Completed');
  const alertP=active.filter(p=>hasAlert(p));
  const totalQ=active.reduce((s,p)=>s+(parseFloat(p['Value'])||0),0);
  const now=new Date();
  const soon=active.filter(p=>{if(!p['Install Start'])return false;const d=Math.round((new Date(p['Install Start'])-now)/86400000);return d>=0&&d<=30;}).length;
  const mJobs=closed.filter(p=>p['Ending Margin']!=null&&p['Ending Margin']!==''&&p['Starting Margin']!=null&&p['Starting Margin']!=='');
  const avgMV=mJobs.length?mJobs.reduce((s,p)=>s+(parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin'])),0)/mJobs.length:0;

  const metricsHTML=`<div class="metrics">
    <div class="metric"><div class="metric-label">Active jobs</div><div class="metric-value">${active.length}</div><div class="metric-sub">${projects.length} total</div></div>
    <div class="metric"><div class="metric-label">Pipeline</div><div class="metric-value" style="font-size:20px;color:var(--teal)">${fmt$(totalQ,true)}</div><div class="metric-sub">active value</div></div>
    <div class="metric"><div class="metric-label">Alerts</div><div class="metric-value" style="color:${alertP.length>0?'#FF3B30':'#34C759'}">${alertP.length}</div><div class="metric-sub">need attention</div></div>
    <div class="metric"><div class="metric-label">Starting in 30 days</div><div class="metric-value" style="color:${soon>0?'#FF9500':'#34C759'}">${soon}</div><div class="metric-sub">installer demand</div></div>
    <div class="metric"><div class="metric-label">Margin variance</div><div class="metric-value" style="font-size:${ownerMode?'20px':'14px'};color:${ownerMode?(avgMV<0?'#FF3B30':'#34C759'):'var(--text-tertiary)'};font-weight:${ownerMode?300:400}">${ownerMode?(avgMV>=0?'+':'')+((avgMV*100).toFixed(1))+'%':'— owner only'}</div><div class="metric-sub">${ownerMode?mJobs.length+' closed jobs':'unlock to view'}</div></div>
  </div>`;

  const pmListHTML=PMS.map(pm=>{
    const pmA=active.filter(p=>p['Our PM']===pm);
    const total=pmA.reduce((s,p)=>s+(parseFloat(p['Value'])||0),0);
    const maxV=Math.max(total,1);
    const statVals={};STATUSES.forEach(s=>statVals[s]=pmA.filter(p=>p['Job Status']===s).reduce((x,p)=>x+(parseFloat(p['Value'])||0),0));
    const pmC=closed.filter(p=>p['Our PM']===pm);
    const pmMJ=pmC.filter(p=>p['Ending Margin']!=null&&p['Ending Margin']!==''&&p['Starting Margin']!=null&&p['Starting Margin']!=='');
    const pmMV=pmMJ.length?pmMJ.reduce((s,p)=>s+(parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin'])),0)/pmMJ.length:null;
    const segs=STATUSES.map(s=>{const v=statVals[s],cnt=pmA.filter(p=>p['Job Status']===s).length;if(!v)return'';return`<div class="pm-seg" style="flex:${v/maxV};background:${SC[s]}">${cnt>0?cnt+'·'+fmt$(v,true):''}</div>`;}).join('');
    const breakdown=STATUSES.filter(s=>statVals[s]>0).map(s=>{const cnt=pmA.filter(p=>p['Job Status']===s).length;return`${s}: ${cnt} · ${fmt$(statVals[s],true)}`;}).join('  ·  ');
    return`<div class="pm-row">
      <div><div class="pm-name">${pm.split(' ')[0]}</div><div class="pm-count">${pmA.length} jobs · ${fmt$(total,true)}</div></div>
      <div><div class="pm-bar-wrap">${segs||`<div style="flex:1;background:var(--border);border-radius:6px"></div>`}</div><div class="pm-breakdown">${breakdown||'No active jobs'}</div></div>
      ${ownerMode&&pmMV!=null?`<div class="pm-margin" style="color:${pmMV<0?'#FF3B30':'#34C759'}">${pmMV>=0?'+':''}${(pmMV*100).toFixed(1)}%</div>`:''}
    </div>`;
  }).join('');

  const alertsSorted=[...alertP].sort((a,b)=>{
    const s=p=>{const al=computeAlerts(p);return Object.values(al).filter(v=>v==='crit').length*2+Object.values(al).filter(v=>v==='warn').length;};
    return s(b)-s(a);
  });
  const alertsHTML=alertsSorted.length?alertsSorted.map(p=>{
    const al=computeAlerts(p);
    const crits=['Design','Materials','ETA','Start-up'].filter((_,i)=>Object.values(al)[i]==='crit');
    const warns=['Design','Materials','ETA','Start-up'].filter((_,i)=>Object.values(al)[i]==='warn');
    return`<div class="alert-row"><div class="alert-ind ${crits.length?'ai-c':'ai-w'}"></div><div><div class="alert-name">${p['Project Name']||'—'}</div><div class="alert-meta">${p['Our PM']||''} · ${p['Install Start']||'TBD'}</div><div class="alert-pills">${crits.map(l=>`<span class="ap ap-c">${l}</span>`).join('')}${warns.map(l=>`<span class="ap ap-w">${l}</span>`).join('')}</div></div></div>`;
  }).join(''):`<div class="no-alert">All projects on track</div>`;

  const suElig=closed.filter(p=>(parseFloat(p['Value'])||0)>=50000);
  const suHit=suElig.filter(p=>p['Startup Meeting']&&p['Install Start']&&Math.round((new Date(p['Install Start'])-new Date(p['Startup Meeting']))/86400000)>=7);
  const suRate=suElig.length?Math.round(suHit.length/suElig.length*100):100;
  const mPass=mJobs.filter(p=>(parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin']))>=-0.05);
  const mRate=mJobs.length?Math.round(mPass.length/mJobs.length*100):100;

  const benchHTML=`
    <div class="bench-item">
      <div class="bench-top"><span class="bench-lbl">Start-up meeting compliance</span><span class="bench-pct" style="color:${bc(suRate)}">${suRate}%</span></div>
      <div class="bench-track"><div class="bench-fill" style="width:${suRate}%;background:${bc(suRate)}"></div></div>
      <div class="bench-detail">${suHit.length} of ${suElig.length} eligible jobs · ≥7 days prior on $50K+ jobs</div>
    </div>
    <div class="bench-item">
      <div class="bench-top"><span class="bench-lbl">Margin protection</span><span class="bench-pct" style="color:${ownerMode?bc(mRate):'var(--text-tertiary)'}">${ownerMode?mRate+'%':'—'}</span></div>
      <div class="bench-track"><div class="bench-fill" style="width:${ownerMode?mRate:0}%;background:${bc(mRate)}"></div></div>
      <div class="bench-detail">${ownerMode?`${mPass.length} of ${mJobs.length} jobs · loss ≤5%`:'Unlock owner view for margin data'}</div>
    </div>`;

  const activeWithLoc=active.filter(p=>p['Latitude']&&p['Longitude']);
  const seen={};
  const pinsHTML=activeWithLoc.map(p=>{
    const x=locToX(parseFloat(p['Longitude'])),y=locToY(parseFloat(p['Latitude']));
    const key=`${Math.round(x)},${Math.round(y)}`;
    const off=seen[key]?seen[key]*12:0;seen[key]=(seen[key]||0)+1;
    return`<div class="pin" style="left:${x}%;top:${y}%;margin-left:${off}px"><div class="pin-dot" style="background:${pinColor(p)}"></div><div class="pin-tip"><div style="font-weight:500;margin-bottom:2px">${(p['Project Name']||'').length>24?(p['Project Name']||'').substring(0,24)+'…':p['Project Name']||'—'}</div><div style="color:var(--text-secondary)">${p['Our PM']||''}</div><div style="color:var(--text-secondary)">${fmt$(p['Value'],true)} · ${p['Install Start']||'TBD'}</div></div></div>`;
  }).join('');

  const pipeHTML=STATUSES.map(s=>{
    const jobs=active.filter(p=>p['Job Status']===s);
    const val=jobs.reduce((x,p)=>x+(parseFloat(p['Value'])||0),0);
    if(!jobs.length)return'';
    return`<div class="pipe-row"><div style="display:flex;align-items:center"><div class="pipe-dot" style="background:${SC[s]}"></div><span class="pipe-label">${s}</span></div><span class="pipe-jobs">${jobs.length} job${jobs.length!==1?'s':''}</span><span class="pipe-val">${fmt$(val,true)}</span></div>`;
  }).filter(Boolean).join('')+`<div class="pipe-total"><span class="pipe-total-lbl">Total active</span><span class="pipe-total-val">${fmt$(totalQ,true)}</span></div>`;

  document.getElementById('main-content').innerHTML=`
    <div class="view active" id="view-tv">
      ${metricsHTML}
      <div class="main-grid">
        <div class="card"><div class="card-title">PM pipeline — jobs & value by status</div><div class="pm-list">${pmListHTML}</div>
          <div class="map-legend" style="margin-top:10px">
            ${STATUSES.map(s=>`<span class="leg-item"><span class="leg-dot" style="background:${SC[s]}"></span>${s}</span>`).join('')}
          </div>
        </div>
        <div class="side-col">
          <div class="card"><div class="card-title">Needs attention</div><div class="alerts-wrap">${alertsHTML}</div></div>
          <div class="card"><div class="card-title">Benchmark compliance</div><div class="bench-list">${benchHTML}</div></div>
        </div>
      </div>
      <div class="bottom-grid">
        <div class="card">
          <div class="card-title">Active job locations</div>
          <div class="map-wrap">
            <div class="map-grid-lines"></div>
            <div class="map-region" style="top:8%;left:72%">Fort McMurray</div>
            <div class="map-region" style="top:21%;left:57%">Edmonton</div>
            <div class="map-region" style="top:33%;left:40%">Grande Prairie</div>
            <div class="map-region" style="top:47%;left:55%">Red Deer</div>
            <div class="map-region" style="top:59%;left:49%">Calgary</div>
            <div class="map-region" style="top:73%;left:27%">Lethbridge</div>
            ${pinsHTML}
          </div>
          <div class="map-legend">
            <span class="leg-item"><span class="leg-dot" style="background:#34C759"></span>In progress</span>
            <span class="leg-item"><span class="leg-dot" style="background:#007AFF"></span>Not started</span>
            <span class="leg-item"><span class="leg-dot" style="background:#FF9500"></span>Warning</span>
            <span class="leg-item"><span class="leg-dot" style="background:#FF3B30"></span>Critical</span>
          </div>
        </div>
        <div class="card"><div class="card-title">Pipeline summary</div>${pipeHTML}</div>
      </div>
    </div>`;
}

function renderOwner(){
  const active=projects.filter(p=>p['Job Status']!=='Completed');
  const closed=projects.filter(p=>p['Job Status']==='Completed');

  const pmCardsHTML=PMS.map((pm,pi)=>{
    const col=PM_COLORS[pi];
    const all=projects.filter(p=>p['Our PM']===pm);
    const pmA=active.filter(p=>p['Our PM']===pm);
    const pmC=closed.filter(p=>p['Our PM']===pm);
    const mJobs=pmC.filter(p=>p['Ending Margin']!=null&&p['Ending Margin']!==''&&p['Starting Margin']!=null&&p['Starting Margin']!=='');
    const totalMV=mJobs.reduce((s,p)=>s+(parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin'])),0);
    const avgMV=mJobs.length?totalMV/mJobs.length:null;
    const dollarImpact=mJobs.reduce((s,p)=>s+((parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin']))*(parseFloat(p['Value'])||0)),0);
    const mvC=avgMV==null?'n':avgMV>=-0.01?'g':avgMV>=-0.05?'a':'r';
    const suElig=pmC.filter(p=>(parseFloat(p['Value'])||0)>=50000);
    const suHit=suElig.filter(p=>p['Startup Meeting']&&p['Install Start']&&Math.round((new Date(p['Install Start'])-new Date(p['Startup Meeting']))/86400000)>=7);
    const suRate=suElig.length?Math.round(suHit.length/suElig.length*100):null;
    const suC=suRate==null?'n':suRate===100?'g':suRate>=80?'a':'r';
    const troubled=pmA.filter(p=>p['Job Status']==='Overdue'||p['Job Status']==='On Hold').length;
    const trC=troubled===0?'g':troubled===1?'a':'r';
    const missing=pmA.filter(p=>(!p['Warranty Status']||p['Warranty Status']==='Not Started')||(!p['Startup Meeting']&&(parseFloat(p['Value'])||0)>=50000));
    const misC=missing.length===0?'g':missing.length<=2?'a':'r';
    const now=new Date();
    const soon=pmA.filter(p=>{if(!p['Install Start'])return false;const d=Math.round((new Date(p['Install Start'])-now)/86400000);return d>=0&&d<=30;});
    const soonC=soon.length===0?'n':soon.length<=2?'a':'r';
    const totalCO=all.reduce((s,p)=>s+(parseInt(p['Change Orders'])||0),0);
    const coC=totalCO===0?'n':totalCO<=3?'a':'r';
    return`<div class="pm-detail-card">
      <div class="pm-detail-head">
        <div class="pm-avatar" style="background:${col.bg};color:${col.text}">${initials(pm)}</div>
        <div><div class="pm-detail-name">${pm}</div><div class="pm-detail-sub">${pmA.length} active · ${pmC.length} closed</div></div>
      </div>
      <div class="sig-row"><div><div class="sig-lbl">Margin variance</div><div class="sig-sub">${mJobs.length} closed jobs</div></div>
        <div class="sig-val-wrap"><div><div class="sig-val" style="color:${avgMV==null?'var(--text-tertiary)':avgMV<0?'var(--red)':'var(--green)'}">${avgMV!=null?(avgMV>=0?'+':'')+((avgMV*100).toFixed(1))+'%':'no data'}</div><div class="sig-sub-val">${dollarImpact!==0?(dollarImpact>=0?'+':'')+fmt$(dollarImpact,true)+' net':''}</div></div>${dot(mvC)}</div></div>
      <div class="sig-row"><div><div class="sig-lbl">Start-up benchmark</div><div class="sig-sub">${suElig.length} eligible</div></div>
        <div class="sig-val-wrap"><div><div class="sig-val">${suRate!=null?suRate+'%':'N/A'}</div><div class="sig-sub-val">${suHit.length} of ${suElig.length} on time</div></div>${dot(suC)}</div></div>
      <div class="sig-row"><div><div class="sig-lbl">Overdue / on hold</div><div class="sig-sub">active jobs</div></div>
        <div class="sig-val-wrap"><div><div class="sig-val">${troubled}</div><div class="sig-sub-val">${troubled>0?pmA.filter(p=>p['Job Status']==='Overdue'||p['Job Status']==='On Hold').map(p=>(p['Project Name']||'').split(' - ').pop()).join(', '):''}</div></div>${dot(trC)}</div></div>
      <div class="sig-row"><div><div class="sig-lbl">Missing close-out data</div><div class="sig-sub">active jobs</div></div>
        <div class="sig-val-wrap"><div><div class="sig-val">${missing.length}</div><div class="sig-sub-val">${missing.length>0?'warranty / start-up':''}</div></div>${dot(misC)}</div></div>
      <div class="sig-row"><div><div class="sig-lbl">Starting in 30 days</div><div class="sig-sub">installer demand</div></div>
        <div class="sig-val-wrap"><div><div class="sig-val">${soon.length}</div>${soon.length>0?`<div class="sig-sub-val">${soon.slice(0,1).map(p=>`${(p['Project Name']||'').split(' - ').pop()} (${Math.round((new Date(p['Install Start'])-now)/86400000)}d)`).join('')}</div>`:''}</div>${dot(soonC)}</div></div>
      <div class="sig-row"><div><div class="sig-lbl">Total change orders</div><div class="sig-sub">all jobs</div></div>
        <div class="sig-val-wrap"><div><div class="sig-val">${totalCO}</div><div class="sig-sub-val">${totalCO>0?all.filter(p=>parseInt(p['Change Orders']||0)>0).length+' job(s)':''}</div></div>${dot(coC)}</div></div>
    </div>`;
  }).join('');

  const clientMap={};
  projects.forEach(p=>{
    getContacts(p).forEach(c=>{
      if(!c.name)return;
      if(!clientMap[c.name])clientMap[c.name]={name:c.name,role:c.role,company:p['Client']||'',jobs:[],marginJobs:[]};
      clientMap[c.name].jobs.push(p);
      if(p['Ending Margin']!=null&&p['Ending Margin']!==''&&p['Starting Margin']!=null&&p['Starting Margin']!=='')clientMap[c.name].marginJobs.push(p);
    });
  });
  const clientList=Object.values(clientMap).map(c=>{
    const mv=c.marginJobs.length?c.marginJobs.reduce((s,p)=>s+(parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin'])),0)/c.marginJobs.length:null;
    const di=c.marginJobs.reduce((s,p)=>s+((parseFloat(p['Ending Margin'])-parseFloat(p['Starting Margin']))*(parseFloat(p['Value'])||0)),0);
    return{...c,avgMV:mv,dollarImpact:di};
  }).sort((a,b)=>{if(a.avgMV==null&&b.avgMV!=null)return 1;if(b.avgMV==null&&a.avgMV!=null)return-1;if(a.avgMV==null&&b.avgMV==null)return b.jobs.length-a.jobs.length;return a.avgMV-b.avgMV;});

  const clientHTML=clientList.map(c=>{
    const flag=c.avgMV==null?`<span class="flag f-n">no data</span>`:c.avgMV<-0.05?`<span class="flag f-r">margin risk</span>`:c.avgMV<0?`<span class="flag f-a">watch</span>`:`<span class="flag f-g">ok</span>`;
    const pmsOn=[...new Set(c.jobs.map(p=>p['Our PM']||'').filter(Boolean).map(pm=>pm.split(' ')[0]))].join(', ');
    return`<div class="client-row"><div><div class="client-name">${c.name}</div><div class="client-co">${c.role} · ${c.company} · ${pmsOn}</div></div>
      <div class="client-stat"><div class="client-stat-val">${c.jobs.length}</div><div class="client-stat-lbl">jobs</div></div>
      <div class="client-stat"><div class="client-stat-val" style="color:${c.avgMV==null?'var(--text-tertiary)':c.avgMV<0?'var(--red)':'var(--green)'}">${c.avgMV!=null?(c.avgMV>=0?'+':'')+((c.avgMV*100).toFixed(1))+'%':'—'}</div><div class="client-stat-lbl">margin var</div></div>
      <div>${flag}</div></div>`;
  }).join('');

  const allActive=projects.filter(p=>p['Job Status']!=='Completed');
  const missingItems=allActive.map(p=>{
    const fields=[];
    if(!p['Warranty Status']||p['Warranty Status']==='Not Started')fields.push('Warranty');
    if(!p['Startup Meeting']&&(parseFloat(p['Value'])||0)>=50000)fields.push('Start-up');
    return{...p,fields};
  }).filter(p=>p.fields.length>0);

  const missingHTML=missingItems.length?missingItems.slice(0,10).map(p=>`
    <div class="missing-item">
      <div><div class="missing-name">${(p['Project Name']||'').split(' - ').pop()}</div><div class="missing-pm">${p['Our PM']||''}</div></div>
      <div class="mf-pills">${p.fields.map(f=>`<span class="mf">${f}</span>`).join('')}</div>
    </div>`).join(''):`<div class="no-data">All jobs have complete data</div>`;

  document.getElementById('main-content').innerHTML=`
    <div class="view active" id="view-owner">
      <div><div style="font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px">PM performance — all signals</div>
      <div class="pm-detail-grid">${pmCardsHTML}</div></div>
      <div class="client-section">
        <div style="font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px">Client intelligence & missing data</div>
        <div class="client-cols">
          <div><div class="client-col-title">Client contacts ranked by margin impact</div>${clientHTML||`<div class="no-data">No margin data yet</div>`}</div>
          <div><div class="client-col-title">Jobs with missing close-out data</div>${missingHTML}</div>
        </div>
      </div>
    </div>`;
}

function toggleOwner(){
  if(ownerMode){
    ownerMode=false;
    document.getElementById('owner-dot').classList.remove('active');
    document.getElementById('btn-owner').style.display='none';
    currentView='tv';
    document.getElementById('btn-tv').classList.add('active');
    document.getElementById('btn-owner').classList.remove('active');
    render();
    return;
  }
  document.getElementById('pw-root').innerHTML=`
    <div class="pw-overlay" onclick="if(event.target===this)cancelPw()">
      <div class="pw-box">
        <div class="pw-title">Owner access</div>
        <div class="pw-sub">Enter your password to unlock financial and performance data</div>
        <input class="pw-input" type="password" id="pw-inp" placeholder="••••••••" onkeydown="if(event.key==='Enter')confirmPw()">
        <div class="pw-error" id="pw-err"></div>
        <div class="pw-btns"><button class="pw-cancel" onclick="cancelPw()">Cancel</button><button class="pw-confirm" onclick="confirmPw()">Unlock</button></div>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('pw-inp')?.focus(),10);
}

function confirmPw(){
  const v=document.getElementById('pw-inp')?.value;
  if(v===OWNER_PASSWORD){
    ownerMode=true;
    document.getElementById('pw-root').innerHTML='';
    document.getElementById('owner-dot').classList.add('active');
    document.getElementById('btn-owner').style.display='block';
    document.getElementById('btn-tv').classList.remove('active');
    document.getElementById('btn-owner').classList.add('active');
    currentView='owner';
    render();
  } else {
    document.getElementById('pw-err').textContent='Incorrect password';
    document.getElementById('pw-inp').value='';
    document.getElementById('pw-inp').focus();
  }
}
function cancelPw(){document.getElementById('pw-root').innerHTML='';}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function tick(){
  countdown--;
  const m=Math.floor(countdown/60),s=countdown%60;
  document.getElementById('refresh-label').textContent=`↻ ${m}:${s.toString().padStart(2,'0')}`;
  if(countdown<=0){countdown=300;loadData();showToast('Dashboard refreshed');}
}

loadData();
timer=setInterval(tick,1000);
</script>
</body>
</html>
